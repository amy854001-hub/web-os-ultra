const FSCtx = createContext(null);
const useFS = () => useContext(FSCtx);

const FSProvider = ({children}) => {
  const [fs, setFs] = useState({
    Documents:{ type:'folder', children:{
      'Hello.txt':{type:'file',ext:'txt',content:'Hello, World!\n\nWelcome to WebOS Ultra! 🎉'},
      'ReadMe.txt':{type:'file',ext:'txt',content:'WebOS Ultra — Feature List\n\n• Calculator\n• Paint\n• Snake Game\n• Weather\n• AI Chat\n• Camera\n• Music Player\n• File Manager\n• Calendar & Clock\n• Voxel World\n• Liquid Logic\n• Notepad'},
    }},
    Pictures:{ type:'folder', children:{} },
    Downloads:{ type:'folder', children:{} },
    Desktop:{ type:'folder', children:{} },
  });

  const getFolder = (path) => {
    let cur = fs;
    for(const p of path){ if(!cur[p]||cur[p].type!=='folder') return null; cur=cur[p].children; }
    return cur;
  };
  const createFile = (path,name) => setFs(prev=>{
    const n=JSON.parse(JSON.stringify(prev));
    let c=n; for(const p of path) c=c[p].children;
    const fname=name.includes('.')?name:name+'.txt';
    c[fname]={type:'file',ext:fname.split('.').pop(),content:''};
    return n;
  });
  const createFolder = (path,name) => setFs(prev=>{
    const n=JSON.parse(JSON.stringify(prev));
    let c=n; for(const p of path) c=c[p].children;
    c[name]={type:'folder',children:{}};
    return n;
  });
  const deleteNode = (path,name) => setFs(prev=>{
    const n=JSON.parse(JSON.stringify(prev));
    let c=n; for(const p of path) c=c[p].children;
    delete c[name]; return n;
  });
  const saveFile = (path,name,content) => setFs(prev=>{
    const n=JSON.parse(JSON.stringify(prev));
    let c=n; for(const p of path) c=c[p].children;
    if(c[name]) c[name].content=content;
    return n;
  });

  return <FSCtx.Provider value={{fs,getFolder,createFile,createFolder,deleteNode,saveFile}}>{children}</FSCtx.Provider>;
};

//  HOOK: useWindowDrag
// ══════════════════════════════════════════════
const useWindowDrag = (onFocus, onMove) => {
  const [drag, setDrag] = useState(false);
  const off = useRef({x:0,y:0});

  const onDown = useCallback((e) => {
    e.stopPropagation(); onFocus(); setDrag(true);
    const r = e.currentTarget.parentElement.getBoundingClientRect();
    off.current = {x:e.clientX-r.left, y:e.clientY-r.top};
  },[onFocus]);

  useEffect(()=>{
    const mv = e => { if(!drag) return; onMove({x:e.clientX-off.current.x, y:Math.max(0,e.clientY-off.current.y)}); };
    const up = () => setDrag(false);
    if(drag){ window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up); }
    return ()=>{ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
  },[drag,onMove]);

  return {onDown, drag};
};

const WinFrame = ({app, state, active, onClose, onMin, onMax, onFocus, onMove, children}) => {
  const {onDown, drag} = useWindowDrag(onFocus, onMove);
  if(!state.open) return null;
  const maxed = state.maxed;
  const style = maxed
    ? {left:0,top:0,width:'100vw',height:'calc(100vh - 48px)',zIndex:state.z}
    : {left:state.x,top:state.y,width:app.w,height:app.h,zIndex:state.z,
       boxShadow:active?'0 28px 56px rgba(0,0,0,.5)':'0 8px 24px rgba(0,0,0,.28)'};
  return (
    <div className={`absolute flex flex-col overflow-hidden border border-white/20 transition-opacity duration-200 window-enter ${state.min?'opacity-0 scale-90 pointer-events-none':''}`}
      style={{...style,borderRadius:12}} onMouseDown={onFocus}>
      <div className={`h-9 flex items-center justify-between px-3 select-none shrink-0 ${active?'bg-slate-800 text-white':'bg-slate-200 text-slate-500'} ${!maxed&&(drag?'cursor-grabbing':'cursor-grab')}`}
        onMouseDown={maxed?undefined:onDown}>
        <div className="flex items-center gap-1.5 min-w-0">
          <app.icon size={13} className="shrink-0"/>
          <span className="text-xs font-semibold truncate">{app.title}</span>
        </div>
        <div className="flex items-center gap-0.5 shrink-0 ml-2">
          <button onClick={e=>{e.stopPropagation();onMin();}} className="w-6 h-6 flex items-center justify-center hover:bg-white/20 rounded transition-colors"><Minus size={11}/></button>
          <button onClick={e=>{e.stopPropagation();onMax();}} className="w-6 h-6 flex items-center justify-center hover:bg-white/20 rounded transition-colors"><Maximize2 size={11}/></button>
          <button onClick={e=>{e.stopPropagation();onClose();}} className="w-6 h-6 flex items-center justify-center hover:bg-red-500 hover:text-white rounded transition-colors"><X size={11}/></button>
        </div>
      </div>
      <div className="flex-1 bg-white relative overflow-hidden flex flex-col">{children}</div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Calculator
// ══════════════════════════════════════════════
const CalcApp = () => {
  const [disp,setDisp]=useState('0');
  const [prev,setPrev]=useState(null);
  const [op,setOp]=useState(null);
  const [reset,setReset]=useState(false);
  const [hist,setHist]=useState([]);
  const inp=d=>{setDisp(p=>(reset||p==='0')?String(d):(p.length>=12?p:p+d));setReset(false);};
  const dot=()=>{if(reset){setDisp('0.');setReset(false);return;}if(!disp.includes('.'))setDisp(p=>p+'.');};
  const setOper=o=>{setPrev(+disp);setOp(o);setReset(true);};
  const calc=()=>{
    if(prev===null||!op)return;
    const c=+disp,p=prev;
    const m={'+':p+c,'-':p-c,'×':p*c,'÷':c?p/c:'Err','%':p%c};
    const res=String(parseFloat((m[op]).toFixed(10)));
    setHist(h=>[`${p} ${op} ${c} = ${res}`,...h.slice(0,4)]);
    setDisp(res);setPrev(null);setOp(null);setReset(true);
  };
  const clear=()=>{setDisp('0');setPrev(null);setOp(null);setReset(false);};
  const neg=()=>setDisp(String(-+disp));
  const pct=()=>setDisp(String(+disp/100));
  const sqrt=()=>setDisp(String(parseFloat(Math.sqrt(+disp).toFixed(10))));
  const BC=(lbl,t,fn)=>{
    const c={op:'h-14 bg-amber-400 hover:bg-amber-300 text-white rounded-2xl font-bold text-xl shadow-md active:scale-95 transition-all',
      func:'h-14 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-2xl font-semibold text-lg active:scale-95 transition-all',
      eq:'h-14 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all',
      num:'h-14 bg-white hover:bg-slate-50 text-slate-800 rounded-2xl font-medium text-xl shadow-sm border border-slate-100 active:scale-95 transition-all'}[t];
    return <button key={lbl} onClick={fn} className={c}>{lbl}</button>;
  };
  return (
    <div className="flex flex-col h-full bg-slate-100">
      <div className="bg-slate-800 px-5 pt-4 pb-3 flex flex-col items-end shrink-0">
        <div className="text-slate-400 text-sm h-5 mb-1">{op?`${prev} ${op}`:''}</div>
        <div className="text-white text-4xl font-light truncate max-w-full">{disp}</div>
      </div>
      {hist.length>0&&<div className="bg-slate-700/60 px-4 py-1.5 space-y-0.5 shrink-0">{hist.map((h,i)=><div key={i} className="text-xs text-slate-400">{h}</div>)}</div>}
      <div className="flex-1 grid grid-cols-4 gap-2 p-3">
        {BC('AC','func',clear)}{BC('+/-','func',neg)}{BC('%','func',pct)}{BC('÷','op',()=>setOper('÷'))}
        {BC('7','num',()=>inp(7))}{BC('8','num',()=>inp(8))}{BC('9','num',()=>inp(9))}{BC('×','op',()=>setOper('×'))}
        {BC('4','num',()=>inp(4))}{BC('5','num',()=>inp(5))}{BC('6','num',()=>inp(6))}{BC('-','op',()=>setOper('-'))}
        {BC('1','num',()=>inp(1))}{BC('2','num',()=>inp(2))}{BC('3','num',()=>inp(3))}{BC('+','op',()=>setOper('+'))}
        {BC('√','func',sqrt)}{BC('0','num',()=>inp(0))}{BC('.','num',dot)}{BC('=','eq',calc)}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Snake Game
// ══════════════════════════════════════════════
const SnakeApp = () => {
  const G=20,S=18;
  const [snake,setSnake]=useState([{x:10,y:10},{x:9,y:10},{x:8,y:10}]);
  const [food,setFood]=useState({x:15,y:15});
  const [run,setRun]=useState(false);
  const [dead,setDead]=useState(false);
  const [score,setScore]=useState(0);
  const [hi,setHi]=useState(0);
  const dRef=useRef({x:1,y:0});
  const rndFood=useCallback(s=>{let f;do{f={x:Math.floor(Math.random()*G),y:Math.floor(Math.random()*G)}}while(s.some(b=>b.x===f.x&&b.y===f.y));return f;},[]);
  useEffect(()=>{
    if(!run)return;
    const id=setInterval(()=>{
      setSnake(prev=>{
        const d=dRef.current,h={x:(prev[0].x+d.x+G)%G,y:(prev[0].y+d.y+G)%G};
        if(prev.some(b=>b.x===h.x&&b.y===h.y)){setRun(false);setDead(true);setHi(x=>Math.max(x,score));return prev;}
        const ate=h.x===food.x&&h.y===food.y;
        const ns=[h,...prev.slice(0,ate?prev.length:prev.length-1)];
        if(ate){setScore(s=>s+10);setFood(rndFood(ns));}
        return ns;
      });
    },115);
    return()=>clearInterval(id);
  },[run,food,score,rndFood]);
  useEffect(()=>{
    const h=e=>{
      const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
      const nd=m[e.code];
      if(nd&&!(nd.x===-dRef.current.x&&nd.y===-dRef.current.y))dRef.current=nd;
      if(e.code==='Space'){e.preventDefault();if(dead)restart();else setRun(r=>!r);}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[dead]);
  const restart=()=>{const s=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];setSnake(s);dRef.current={x:1,y:0};setFood(rndFood(s));setScore(0);setDead(false);setRun(true);};
  return (
    <div className="flex flex-col h-full bg-gray-900 items-center justify-center gap-3 p-2">
      <div className="flex gap-8 text-sm font-mono text-white">
        <span>SCORE: <span className="text-green-400 font-bold">{score}</span></span>
        <span>BEST: <span className="text-yellow-400 font-bold">{hi}</span></span>
      </div>
      <div className="relative rounded border border-green-900/50" style={{width:G*S,height:G*S,background:'#0d1117'}}>
        {snake.map((b,i)=><div key={i} className="absolute rounded-sm" style={{left:b.x*S+1,top:b.y*S+1,width:S-2,height:S-2,background:i===0?'#4ade80':`hsl(${120-i*1.5},65%,${42-i*.3}%)`}}/>)}
        <div className="absolute rounded-full" style={{left:food.x*S+3,top:food.y*S+3,width:S-6,height:S-6,background:'#f87171',boxShadow:'0 0 8px #f87171'}}/>
        {(!run||dead)&&<div className="absolute inset-0 bg-black/75 flex flex-col items-center justify-center gap-3 rounded">
          {dead&&<><div className="text-red-400 text-2xl font-black">GAME OVER</div><div className="text-white/60 text-sm">Score: {score}</div></>}
          <button onClick={restart} className="px-7 py-2 bg-green-500 text-white rounded-full font-bold text-sm hover:bg-green-400 transition-colors">{dead?'Play Again':'Start Game'}</button>
        </div>}
      </div>
      <div className="flex gap-1.5">
        {[['←','ArrowLeft'],['↑','ArrowUp'],['↓','ArrowDown'],['→','ArrowRight']].map(([l,c])=>(
          <button key={c} className="w-9 h-9 bg-slate-700 text-white rounded-lg hover:bg-slate-600 active:bg-slate-500 transition-colors" onClick={()=>window.dispatchEvent(new KeyboardEvent('keydown',{code:c}))}>{l}</button>
        ))}
        <button className="px-3 h-9 bg-green-700 text-white rounded-lg text-xs font-semibold hover:bg-green-600 transition-colors" onClick={()=>dead?restart():setRun(r=>!r)}>{run?'⏸':dead?'↺':'▶'}</button>
      </div>
      <div className="text-xs text-gray-600">Arrow keys / WASD · Space to pause</div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Paint
// ══════════════════════════════════════════════
const PaintApp = () => {
  const cvRef=useRef(null);
  const [tool,setTool]=useState('pen');
  const [color,setColor]=useState('#1e293b');
  const [size,setSize]=useState(6);
  const drawing=useRef(false),last=useRef(null);
  useEffect(()=>{
    const cv=cvRef.current;cv.width=680;cv.height=370;
    const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
  },[]);
  const getP=e=>{const r=cvRef.current.getBoundingClientRect(),src=e.touches?e.touches[0]:e,sx=cvRef.current.width/r.width,sy=cvRef.current.height/r.height;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};};
  const startDraw=e=>{
    e.preventDefault();drawing.current=true;const p=getP(e);last.current=p;
    if(tool==='fill'){const ctx=cvRef.current.getContext('2d');ctx.fillStyle=color;ctx.fillRect(0,0,cvRef.current.width,cvRef.current.height);return;}
    const ctx=cvRef.current.getContext('2d');ctx.beginPath();ctx.arc(p.x,p.y,size/2,0,Math.PI*2);ctx.fillStyle=tool==='eraser'?'#fff':color;ctx.fill();
  };
  const drawMove=e=>{
    e.preventDefault();if(!drawing.current)return;
    const ctx=cvRef.current.getContext('2d'),p=getP(e);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=tool==='eraser'?'#fff':color;ctx.lineWidth=tool==='eraser'?size*4:size;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=p;
  };
  const endDraw=()=>{drawing.current=false;};
  const clear=()=>{const ctx=cvRef.current.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cvRef.current.width,cvRef.current.height);};
  const save=()=>{const a=document.createElement('a');a.download='painting.png';a.href=cvRef.current.toDataURL();a.click();};
  const PAL=['#1e293b','#ffffff','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#78716c','#fde68a'];
  return (
    <div className="flex flex-col h-full">
      <div className="flex items-center gap-2 px-2 py-1.5 bg-gray-100 border-b border-gray-200 flex-wrap shrink-0">
        {[{id:'pen',e:'✏️'},{id:'eraser',e:'🧹'},{id:'fill',e:'🪣'}].map(t=>(
          <button key={t.id} onClick={()=>setTool(t.id)} title={t.id}
            className={`w-8 h-8 rounded-lg text-base flex items-center justify-center transition-all ${tool===t.id?'bg-blue-500 shadow ring-2 ring-blue-300':'hover:bg-gray-200'}`}>{t.e}</button>
        ))}
        <div className="w-px h-6 bg-gray-300"/>
        {PAL.map(c=><button key={c} onClick={()=>setColor(c)} className={`w-6 h-6 rounded-full border-2 transition-transform hover:scale-110 ${color===c?'border-blue-500 scale-110':'border-white'}`} style={{background:c,boxShadow:c==='#ffffff'?'inset 0 0 0 1px #d1d5db':''}}/>)}
        <input type="color" value={color} onChange={e=>setColor(e.target.value)} className="w-7 h-7 rounded cursor-pointer border-0" title="Custom"/>
        <div className="w-px h-6 bg-gray-300"/>
        <div className="flex items-center gap-1 text-xs text-gray-500">
          <span>Size:</span>
          <input type="range" min="1" max="50" value={size} onChange={e=>setSize(+e.target.value)} className="w-20 accent-blue-500"/>
          <span className="w-5 text-center font-mono">{size}</span>
        </div>
        <div className="ml-auto flex gap-1">
          <button onClick={clear} className="px-2 py-1 text-xs bg-red-50 text-red-600 hover:bg-red-100 rounded transition-colors">Clear</button>
          <button onClick={save} className="px-2 py-1 text-xs bg-green-50 text-green-600 hover:bg-green-100 rounded transition-colors">Save PNG</button>
        </div>
      </div>
      <div className="flex-1 overflow-hidden bg-gray-300 flex items-center justify-center">
        <canvas ref={cvRef} className="shadow-inner" style={{cursor:tool==='eraser'?'cell':'crosshair',maxWidth:'100%',maxHeight:'100%'}}
          onMouseDown={startDraw} onMouseMove={drawMove} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={drawMove} onTouchEnd={endDraw}/>
      </div>
    </div>
  );
};

const CameraApp = () => {
  const vidRef=useRef(null),cvRef=useRef(null);
  const [stream,setStream]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [err,setErr]=useState(null);
  const [filter,setFilter]=useState('none');
  const FILTERS=[{n:'Normal',f:'none'},{n:'B&W',f:'grayscale(1)'},{n:'Sepia',f:'sepia(1)'},{n:'Vivid',f:'saturate(2)'},{n:'Invert',f:'invert(1)'},{n:'Blur',f:'blur(2px)'},{n:'HDR',f:'brightness(1.4) contrast(1.3)'}];
  const start=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:true});setStream(s);setErr(null);if(vidRef.current)vidRef.current.srcObject=s;}catch{setErr('Camera access denied. Please allow permissions.');}};
  const stop=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);};
  useEffect(()=>()=>stream?.getTracks().forEach(t=>t.stop()),[stream]);
  const snap=()=>{const cv=cvRef.current,vi=vidRef.current;cv.width=vi.videoWidth;cv.height=vi.videoHeight;const ctx=cv.getContext('2d');ctx.filter=filter;ctx.drawImage(vi,0,0);setPhoto(cv.toDataURL('image/jpeg',.95));};

// ══════════════════════════════════════════════
//  APP: Liquid Logic (original)
// ══════════════════════════════════════════════
const LiquidApp = () => {
  const COLORS=['#FF6B6B','#4ECDC4','#FFE66D','#FF9F43','#5f27cd','#54a0ff','#ff9ff3','#00d2d3','#1dd1a1'],CAP=4;
  const [level,setLevel]=useState(1);
  const [tubes,setTubes]=useState([]);
  const [sel,setSel]=useState(null);
  const [won,setWon]=useState(false);
  const [toast,setToast]=useState(null);
  const gen=useCallback(lvl=>{
    const nc=Math.min(3+Math.floor(lvl/3),COLORS.length);
    const t=[...Array(nc).fill(0).map((_,i)=>Array(CAP).fill(COLORS[i])),...Array(2).fill(null).map(()=>[])];
    const s=JSON.parse(JSON.stringify(t));
    for(let i=0;i<20+lvl*2;i++){const sr=Math.floor(Math.random()*s.length),dt=Math.floor(Math.random()*s.length);if(sr===dt||!s[sr].length||s[dt].length>=CAP)continue;const c=s[sr][s[sr].length-1];if(s[dt].length&&s[dt][s[dt].length-1]!==c)continue;s[dt].push(s[sr].pop());}
    setTubes(s);setWon(false);setSel(null);
  },[]);
  useEffect(()=>{gen(level);},[level,gen]);
  const click=i=>{
    if(won)return;if(sel===null){if(tubes[i].length)setSel(i);return;}if(sel===i){setSel(null);return;}
    const nt=tubes.map(t=>[...t]);const src=nt[sel],dst=nt[i];if(!src.length){setSel(null);return;}
    const c=src[src.length-1];
    if(dst.length<CAP&&(dst.length===0||dst[dst.length-1]===c)){while(src.length&&dst.length<CAP&&src[src.length-1]===c)dst.push(src.pop());setTubes(nt);setSel(null);if(nt.every(t=>t.length===0||(t.length===CAP&&t.every(x=>x===t[0]))))setWon(true);}
    else{setToast('Invalid Move!');setTimeout(()=>setToast(null),1500);setSel(null);}
  };
  return (
    <div className="flex flex-col h-full bg-gradient-to-br from-slate-900 to-indigo-900 text-white relative">
      <div className="flex justify-between items-center p-4 bg-black/20 shrink-0">
        <button onClick={()=>gen(level)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><RefreshCw size={18}/></button>
        <div className="text-lg font-bold tracking-widest text-cyan-300">LEVEL {level}</div>
        <div className="w-8"/>
      </div>
      <div className="flex-1 flex flex-wrap justify-center content-start gap-5 p-5 overflow-y-auto">
        {tubes.map((tube,i)=>(
          <div key={i} onClick={()=>click(i)} className={`relative w-12 h-40 border-4 border-white/20 border-t-0 rounded-b-3xl bg-white/5 cursor-pointer transition-all duration-200 ${sel===i?'-translate-y-4 shadow-[0_0_20px_rgba(255,255,255,.3)]':'hover:bg-white/10'}`}>
            <div className="absolute bottom-0 w-full flex flex-col-reverse rounded-b-[18px] overflow-hidden">{tube.map((c,ci)=><div key={ci} className="w-full h-8 transition-all duration-400" style={{backgroundColor:c}}/>)}</div>
          </div>
        ))}
      </div>
      {toast&&<div className="absolute bottom-8 left-1/2 -translate-x-1/2 px-4 py-2 bg-red-500/90 text-white rounded-full text-sm font-bold animate-bounce">{toast}</div>}
      {won&&<div className="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center"><Trophy size={60} className="text-yellow-400 mb-3 afloat"/><h2 className="text-3xl font-black mb-4">COMPLETE!</h2><button onClick={()=>setLevel(l=>l+1)} className="flex items-center gap-2 px-8 py-3 bg-gradient-to-r from-pink-500 to-yellow-500 rounded-full font-bold text-lg hover:scale-105 transition-transform">Next Level <Play size={18} fill="currentColor"/></button></div>}
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Voxel World (original preserved)

const VoxelApp = () => {
  const MATERIALS=[{color:0x5da642,name:'Grass'},{color:0x593d29,name:'Dirt'},{color:0x757575,name:'Stone'},{color:0x8b5a2b,name:'Wood'},{color:0xb52020,name:'Brick'}];
  const BLOCK_SIZE=1;
  const mountRef=useRef(null),controlsRef=useRef(null);
  const [activeSlot,setActiveSlot]=useState(0);
  const [isLocked,setIsLocked]=useState(false);
  const activeSlotRef=useRef(activeSlot);
  useEffect(()=>{activeSlotRef.current=activeSlot;},[activeSlot]);
  useEffect(()=>{
    if(!mountRef.current)return;
    const scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);scene.fog=new THREE.Fog(0x87CEEB,10,60);
    const width=mountRef.current.clientWidth,height=mountRef.current.clientHeight;
    const camera=new THREE.PerspectiveCamera(75,width/height,.1,1000);
    const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(width,height);mountRef.current.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff,.6));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(10,20,10);scene.add(dl);
    const matInst=MATERIALS.map(m=>new THREE.MeshLambertMaterial({color:m.color}));
    const geometry=new THREE.BoxGeometry(BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);const objects=[];
    const createBlock=(x,y,z,mi)=>{const b=new THREE.Mesh(geometry,matInst[mi]);b.position.set(x,y,z);scene.add(b);objects.push(b);};
    for(let x=-10;x<10;x++)for(let z=-10;z<10;z++){createBlock(x,0,z,0);if(Math.random()>.95){createBlock(x,1,z,3);createBlock(x,2,z,3);createBlock(x,3,z,0);}}
    const controls=new PointerLockControls(camera,renderer.domElement);controlsRef.current=controls;controls.getObject().position.set(0,2,5);scene.add(controls.getObject());
    const onLock=()=>setIsLocked(true),onUnlock=()=>setIsLocked(false);
    controls.addEventListener('lock',onLock);controls.addEventListener('unlock',onUnlock);
    mountRef.current.addEventListener('click',()=>controls.lock());
    let mF=false,mB=false,mL=false,mR=false,canJump=false;
    const vel=new THREE.Vector3(),dir=new THREE.Vector3();
    const onKD=e=>{switch(e.code){case 'ArrowUp':case 'KeyW':mF=true;break;case 'ArrowLeft':case 'KeyA':mL=true;break;case 'ArrowDown':case 'KeyS':mB=true;break;case 'ArrowRight':case 'KeyD':mR=true;break;case 'Space':if(canJump){vel.y+=12;canJump=false;}break;case 'Digit1':setActiveSlot(0);break;case 'Digit2':setActiveSlot(1);break;case 'Digit3':setActiveSlot(2);break;case 'Digit4':setActiveSlot(3);break;case 'Digit5':setActiveSlot(4);break;}};
    const onKU=e=>{switch(e.code){case 'ArrowUp':case 'KeyW':mF=false;break;case 'ArrowLeft':case 'KeyA':mL=false;break;case 'ArrowDown':case 'KeyS':mB=false;break;case 'ArrowRight':case 'KeyD':mR=false;break;}};
    document.addEventListener('keydown',onKD);document.addEventListener('keyup',onKU);
    const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2(0,0);
    const onMD=e=>{
      if(!controls.isLocked)return;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObjects(objects);
      if(ints.length>0){const i=ints[0];if(i.distance>8)return;if(e.button===2){if(i.face){const p=new THREE.Vector3().copy(i.point).add(i.face.normal);p.divideScalar(BLOCK_SIZE).floor().multiplyScalar(BLOCK_SIZE).addScalar(BLOCK_SIZE/2);createBlock(p.x,p.y,p.z,activeSlotRef.current);}}else if(e.button===0){if(i.object.position.y>0){scene.remove(i.object);objects.splice(objects.indexOf(i.object),1);}}}
    };
    document.addEventListener('mousedown',onMD);
    let prevT=performance.now(),animId;
    const animate=()=>{animId=requestAnimationFrame(animate);const t=performance.now(),delta=(t-prevT)/1000;prevT=t;if(controls.isLocked){vel.x-=vel.x*10*delta;vel.z-=vel.z*10*delta;vel.y-=9.8*4*delta;dir.z=Number(mF)-Number(mB);dir.x=Number(mR)-Number(mL);dir.normalize();if(mF||mB)vel.z-=dir.z*40*delta;if(mL||mR)vel.x-=dir.x*40*delta;controls.moveRight(-vel.x*delta);controls.moveForward(-vel.z*delta);controls.getObject().position.y+=vel.y*delta;if(controls.getObject().position.y<2){vel.y=0;controls.getObject().position.y=2;canJump=true;}}renderer.render(scene,camera);};
    animate();
    return()=>{cancelAnimationFrame(animId);document.removeEventListener('keydown',onKD);document.removeEventListener('keyup',onKU);document.removeEventListener('mousedown',onMD);controls.removeEventListener('lock',onLock);controls.removeEventListener('unlock',onUnlock);renderer.dispose();if(mountRef.current?.contains(renderer.domElement))mountRef.current.removeChild(renderer.domElement);};
  },[]);
  return (
    <div className="relative w-full h-full bg-sky-300">
      <div ref={mountRef} className="w-full h-full"/>
      {!isLocked&&<div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm"><Box size={48} className="text-white mb-3 afloat"/><p className="text-white font-bold text-xl mb-1">Voxel World</p><p className="text-white/70 text-sm mb-2">Click to start · WASD to move · Space to jump</p><p className="text-white/40 text-xs">Left click: break · Right click: place · 1-5: material</p></div>}
      {isLocked&&<>
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"><div className="w-5 h-0.5 bg-white/80 absolute top-1/2 -translate-y-1/2 -translate-x-1/2"/><div className="w-0.5 h-5 bg-white/80 absolute left-1/2 -translate-x-1/2 -translate-y-1/2"/></div>
        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-1">{MATERIALS.map((m,i)=><div key={i} className={`w-9 h-9 rounded border-2 transition-all ${activeSlot===i?'border-white scale-110':'border-white/40'}`} style={{background:`#${m.color.toString(16).padStart(6,'0')}`}} title={m.name}/>)}</div>
      </>}
    </div>
  );
};

    if(id==='snake') return <SnakeApp/>;
    if(id==='paint') return <PaintApp/>;
    if(id==='calendar') return <CalendarApp/>;
    if(id==='weather') return <WeatherApp/>;
    if(id==='chat') return <ChatApp/>;
    if(id==='files') return <FilesApp onOpenInNotepad={openInNotepad}/>;
    if(id==='camera') return <CameraApp/>;
    if(id==='music') return <MusicApp/>;
    if(id==='liquid') return <LiquidApp/>;
    if(id==='voxel') return <VoxelApp/>;
    return null;
  };

  return (
    <div className={`w-screen h-screen overflow-hidden font-sans relative select-none ${dark?'dark':''}`}
      style={{backgroundImage:`url('${wallpaper}')`,backgroundSize:'cover',backgroundPosition:'center'}}
      onContextMenu={e=>{e.preventDefault();setCtx({x:e.clientX,y:e.clientY});setStartOpen(false);}}
      onClick={()=>{setStartOpen(false);setCtx(null);setShowVol(false);}}>

      {/* Desktop Icons */}
      <div className="absolute left-3 top-3 flex flex-col gap-2">
        {Object.values(APPS).map(app=>(
          <button key={app.id} onClick={()=>openApp(app.id)} className="group flex flex-col items-center gap-1 w-[68px] p-2 rounded-xl hover:bg-white/15 transition-colors focus:outline-none">
            <div className={`p-2.5 rounded-2xl shadow-lg text-white ${app.color} group-hover:scale-110 transition-transform`}><app.icon size={22}/></div>
            <span className="text-white text-[11px] font-medium drop-shadow-md text-center leading-tight max-w-full truncate">{app.title}</span>
          </button>
        ))}
      </div>

      {/* Windows */}
      {Object.values(APPS).filter(a=>!a.isExternal).map(app=>(
        <WinFrame key={app.id} app={app} state={wins[app.id]} active={activeId===app.id}
          onClose={()=>closeW(app.id)} onMin={()=>minW(app.id)} onMax={()=>maxW(app.id)}
          onFocus={()=>focusW(app.id)} onMove={pos=>moveW(app.id,pos)}>
          {renderApp(app.id)}
        </WinFrame>
      ))}

      {/* TASKBAR */}
      <div className={`fixed bottom-0 left-0 w-full h-12 backdrop-blur-2xl border-t flex justify-between items-center px-3 z-[500] shadow-lg ${tbBg}`}>
        <div className="flex items-center gap-1.5">
          <button onClick={e=>{e.stopPropagation();setStartOpen(s=>!s);}} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${startOpen?'bg-blue-600 text-white':dark?'hover:bg-white/10 text-white':'hover:bg-black/10'}`}>
            <Menu size={16}/><span>Start</span>
          </button>
          <div className={`h-5 w-px ${dark?'bg-slate-600':'bg-slate-300'} mx-0.5`}/>
          <div className="flex gap-0.5">
            {Object.values(APPS).map(app=>{
              const s=wins[app.id],isOpen=s?.open,isActive=activeId===app.id;
              if(!isOpen&&!app.isExternal)return null;
              if(app.isExternal&&!isActive)return null;
              return(
                <button key={app.id} onClick={()=>isActive?minW(app.id):focusW(app.id)} title={app.title}
                  className={`p-1.5 rounded-md transition-all relative ${isActive?'bg-blue-100 text-blue-700':dark?'hover:bg-white/10 text-white':'hover:bg-black/8 text-slate-600'}`}>
                  <app.icon size={17}/>
                  {isOpen&&<div className={`absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full ${isActive?'bg-blue-600':'bg-slate-400'}`}/>}
                </button>
              );
            })}
          </div>
        </div>
        {/* System Tray */}
        <div className="flex items-center gap-1.5">
          <Wifi size={14} className={dark?'text-white/50':'text-slate-400'}/>
          <div className="relative">
            <button onClick={e=>{e.stopPropagation();setShowVol(v=>!v);}} className={`p-1.5 rounded-md hover:bg-black/8 transition-colors ${dark?'text-white/70':''}`}>
              {vol===0?<VolumeX size={14}/>:vol<40?<Volume1 size={14}/>:<Volume2 size={14}/>}
            </button>
            {showVol&&<div className="absolute bottom-11 right-0 bg-white rounded-2xl shadow-2xl p-4 border border-gray-100 w-36" onClick={e=>e.stopPropagation()}>
              <div className="text-xs text-gray-500 mb-2 text-center font-medium">Volume: {vol}%</div>
              <input type="range" min="0" max="100" value={vol} onChange={e=>setVol(+e.target.value)} className="w-full accent-blue-500"/>
            </div>}
          </div>
          <div className="flex items-center gap-0.5">
            <Battery size={15} className={bat<20?'text-red-500':dark?'text-white/60':'text-slate-500'}/>
            <span className={`text-xs ${dark?'text-white/60':'text-slate-500'}`}>{bat}%</span>
          </div>
          <button onClick={e=>{e.stopPropagation();setDark(d=>!d);}} className={`p-1.5 rounded-md hover:bg-black/8 transition-colors ${dark?'text-yellow-400':''}`}>
            {dark?<Sun size={14}/>:<Moon size={14}/>}
          </button>
          <div className={`flex flex-col items-end text-xs cursor-default ml-1 ${dark?'text-white':'text-slate-700'}`}>
            <span className="font-semibold">{time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            <span className="opacity-50 text-[10px]">{time.toLocaleDateString()}</span>
          </div>
        </div>
      </div>

      {/* START MENU */}
      {startOpen&&(
        <div className={`fixed bottom-14 left-2 w-[280px] backdrop-blur-2xl rounded-2xl shadow-2xl border p-3 z-[600] ${dark?'bg-slate-800/97 border-slate-700':'bg-white/97 border-white/60'}`}
          onClick={e=>e.stopPropagation()}>
          <div className="p-3 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl mb-3 flex items-center gap-3 text-white shadow-lg">
            <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-lg font-bold">U</div>
            <div><div className="font-bold text-sm">User</div><div className="text-xs opacity-70">Administrator · WebOS Ultra</div></div>
          </div>
          {Object.entries(appGroups).map(([group,ids])=>(
            <div key={group} className="mb-2">
              <div className={`text-[10px] font-bold uppercase tracking-wider px-2 mb-1 ${dark?'text-slate-400':'text-slate-400'}`}>{group}</div>
              <div className="grid grid-cols-2 gap-1">
                {ids.map(id=>{const app=APPS[id];return(
                  <button key={id} onClick={()=>openApp(id)} className={`flex items-center gap-2 p-2 rounded-xl transition-all text-left hover:scale-[1.02] ${dark?'hover:bg-white/10':'hover:bg-slate-50'}`}>
                    <div className={`p-1.5 rounded-lg ${app.color} text-white shrink-0`}><app.icon size={13}/></div>
                    <span className={`text-xs font-medium truncate ${dark?'text-white':'text-slate-700'}`}>{app.title}</span>
                  </button>
                );})}
              </div>
            </div>
          ))}
          <div className={`h-px my-2 ${dark?'bg-slate-700':'bg-gray-100'}`}/>
          <button onClick={()=>{if(confirm('Shutdown WebOS?'))document.body.innerHTML='<div style="background:#000;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-family:Inter,sans-serif;font-size:13px;letter-spacing:.15em">SYSTEM OFFLINE</div>';}}
            className="flex items-center gap-3 w-full p-2 hover:bg-red-50 text-red-600 rounded-xl transition-colors">
            <Power size={14}/><span className="text-sm font-medium">Shutdown</span>
          </button>
        </div>
      )}

      {/* CONTEXT MENU */}
      {ctx&&<CtxMenu x={ctx.x} y={ctx.y} items={ctxItems} onClose={()=>setCtx(null)}/>}

      {/* WALLPAPER PICKER */}
      {showWP&&<WPPicker current={wallpaper} onSelect={setWallpaper} onClose={()=>setShowWP(false)}/>}
    </div>
  );
};

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<FSProvider><App/></FSProvider>);
</script>
</body>
</html>
