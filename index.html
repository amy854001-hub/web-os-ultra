const FSProvider = ({children}) => {
  const [fs,setFs]=useState({
    Documents:{type:'folder',children:{
      'Hello.txt':{type:'file',ext:'txt',content:'Hello, World!\n\nWelcome to WebOS Ultra v3.0! 🎉'},
      'ReadMe.txt':{type:'file',ext:'txt',content:'WebOS Ultra v3.0\n\nNew in v3:\n• Scientific Calculator\n• Paint shape tools + undo\n• Snake speed selector + bonus food\n• 5-day weather forecast\n• Calendar with event notes\n• File rename support\n• Music shuffle + repeat\n• Start menu search\n• Desktop clock widget\n• Notification toasts\n• Window resize handles\n• Settings app\n• Icon right-click menu\n• 12 wallpapers'},
    }},
    Pictures:{type:'folder',children:{}},
    Downloads:{type:'folder',children:{}},
    Desktop:{type:'folder',children:{}},
  });
  const getFolder=path=>{let c=fs;for(const p of path){if(!c[p]||c[p].type!=='folder')return null;c=c[p].children;}return c;};
  const mut=fn=>setFs(prev=>{const n=JSON.parse(JSON.stringify(prev));fn(n);return n;});
  const createFile=(path,name)=>mut(n=>{let c=n;for(const p of path)c=c[p].children;const f=name.includes('.')?name:name+'.txt';c[f]={type:'file',ext:f.split('.').pop(),content:''};});
  const createFolder=(path,name)=>mut(n=>{let c=n;for(const p of path)c=c[p].children;c[name]={type:'folder',children:{}};});
  const deleteNode=(path,name)=>mut(n=>{let c=n;for(const p of path)c=c[p].children;delete c[name];});
  const saveFile=(path,name,content)=>mut(n=>{let c=n;for(const p of path)c=c[p].children;if(c[name])c[name].content=content;});
  const renameNode=(path,oldN,newN)=>mut(n=>{let c=n;for(const p of path)c=c[p].children;if(c[oldN]){c[newN]=c[oldN];delete c[oldN];}});
  return <FSCtx.Provider value={{fs,getFolder,createFile,createFolder,deleteNode,saveFile,renameNode}}>{children}</FSCtx.Provider>;
};

// ══════════════════════════════════════════════
//  HOOK: drag
// ══════════════════════════════════════════════
const useWindowDrag=(onFocus,onMove)=>{
  const [drag,setDrag]=useState(false);
  const off=useRef({x:0,y:0});
  const onDown=useCallback(e=>{
    e.stopPropagation();onFocus();setDrag(true);
    const r=e.currentTarget.parentElement.getBoundingClientRect();
    off.current={x:e.clientX-r.left,y:e.clientY-r.top};
  },[onFocus]);
  useEffect(()=>{
    const mv=e=>{if(!drag)return;onMove({x:e.clientX-off.current.x,y:Math.max(0,e.clientY-off.current.y)});};
    const up=()=>setDrag(false);
    if(drag){window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);}
    return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
  },[drag,onMove]);
  return{onDown,drag};
};

// ══════════════════════════════════════════════
//  COMPONENT: WinFrame  (macOS traffic lights + resize)
// ══════════════════════════════════════════════
const WinFrame=({app,state,active,onClose,onMin,onMax,onFocus,onMove,onResize,children})=>{
  const{onDown,drag}=useWindowDrag(onFocus,onMove);
  const rsRef=useRef(null);
  if(!state.open)return null;
  const maxed=state.maxed;
  const W=state.cw||app.w, H=state.ch||app.h;
  const style=maxed
    ?{left:0,top:0,width:'100vw',height:'calc(100vh - 48px)',zIndex:state.z}
    :{left:state.x,top:state.y,width:W,height:H,zIndex:state.z,
      boxShadow:active?'0 32px 64px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.08)':'0 8px 24px rgba(0,0,0,.28)'};

  const startResize=e=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,sw=W,sh=H;
    const mv=ev=>{onResize({cw:Math.max(260,sw+ev.clientX-sx),ch:Math.max(200,sh+ev.clientY-sy)});};
    const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  };

  return(
    <div className={`absolute flex flex-col overflow-hidden border border-white/10 window-enter ${state.min?'opacity-0 scale-90 pointer-events-none transition-all duration-150':''}`}
      style={{...style,borderRadius:maxed?0:12}} onMouseDown={onFocus}>
      {/* Title bar */}
      <div className={`h-9 flex items-center px-3 select-none shrink-0 relative ${active?'bg-slate-800/97 text-white':'bg-slate-700/80 text-slate-400'} ${!maxed&&(drag?'cursor-grabbing':'cursor-grab')}`}
        onMouseDown={maxed?undefined:onDown}>
        {/* Traffic lights */}
        <div className="flex items-center gap-1.5 z-10 group">
          <button onClick={e=>{e.stopPropagation();onClose();}} className="w-3.5 h-3.5 rounded-full bg-red-500 hover:bg-red-400 flex items-center justify-center transition-colors">
            <X size={7} className="opacity-0 group-hover:opacity-100 text-red-900" strokeWidth={3}/>
          </button>
          <button onClick={e=>{e.stopPropagation();onMin();}} className="w-3.5 h-3.5 rounded-full bg-yellow-400 hover:bg-yellow-300 flex items-center justify-center transition-colors">
            <Minus size={7} className="opacity-0 group-hover:opacity-100 text-yellow-900" strokeWidth={3}/>
          </button>
          <button onClick={e=>{e.stopPropagation();onMax();}} className="w-3.5 h-3.5 rounded-full bg-green-500 hover:bg-green-400 flex items-center justify-center transition-colors">
            <Maximize2 size={6} className="opacity-0 group-hover:opacity-100 text-green-900" strokeWidth={3}/>
          </button>
        </div>
        {/* Centered title */}
        <div className="absolute inset-0 flex items-center justify-center gap-1.5 pointer-events-none">
          <app.icon size={12} className="opacity-60 shrink-0"/>
          <span className="text-xs font-semibold truncate opacity-85">{app.title}</span>
        </div>
      </div>
      {/* Content */}
      <div className="flex-1 bg-white relative overflow-hidden flex flex-col">{children}</div>
      {/* Resize handle */}
      {!maxed&&<div className="resize-se" ref={rsRef} onMouseDown={startResize}/>}
    </div>
  );
};

const NtfToast=({ntfs,dismiss})=>(
  <div className="fixed top-3 right-3 z-[99999] flex flex-col gap-2 pointer-events-none" style={{maxWidth:310}}>

const NotepadApp=({initContent=null,initFile=null,dark=false})=>{
  const [text,setText]=useState('');
  const [fname,setFname]=useState(initFile);
  const ntf=useNtf();
  useEffect(()=>{
    if(initContent!==null){setText(initContent);setFname(initFile);}
    else{const s=localStorage.getItem('webos-notepad');if(s)setText(s);}
  },[initContent,initFile]);
  const onChange=e=>{setText(e.target.value);if(!initContent)localStorage.setItem('webos-notepad',e.target.value);};
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  const copyAll=()=>navigator.clipboard.writeText(text).then(()=>ntf('Copied!','Text copied to clipboard','success'));
  return(
    <div className={`flex flex-col h-full ${dark?'bg-gray-900':'bg-white'}`}>
      <div className={`border-b px-1 flex gap-0.5 text-xs shrink-0 ${dark?'bg-gray-800 border-gray-700 text-gray-300':'bg-gray-50 border-gray-200 text-gray-600'}`}>
        {['File','Edit','Format','View'].map(m=><button key={m} className={`px-2 py-1.5 rounded transition-colors ${dark?'hover:bg-gray-700':'hover:bg-gray-200'}`}>{m}</button>)}
        {fname&&<span className={`flex items-center px-2 italic ${dark?'text-gray-500':'text-gray-400'}`}>— {fname}</span>}
        <button onClick={copyAll} className={`ml-auto px-2 py-1.5 rounded transition-colors ${dark?'hover:bg-gray-700':'hover:bg-gray-200'}`}>Copy All</button>
      </div>
      <textarea className={`flex-1 p-4 resize-none outline-none font-mono text-sm leading-relaxed ${dark?'bg-gray-900 text-gray-100':'bg-white text-gray-800'}`}
        value={text} onChange={onChange} placeholder="Start typing here..." spellCheck={false}/>
      <div className={`h-6 border-t flex items-center justify-between px-3 text-xs shrink-0 ${dark?'bg-gray-800 border-gray-700 text-gray-500':'bg-gray-50 border-gray-200 text-gray-400'}`}>
        <span>Ln {text.split('\n').length}</span>
        <span>{words} words · {text.length} chars</span>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Calculator  (Basic + Scientific)
// ══════════════════════════════════════════════
const CalcApp=()=>{
  const [disp,setDisp]=useState('0');
  const [expr,setExpr]=useState('');
  const [prev,setPrev]=useState(null);
  const [op,setOp]=useState(null);
  const [rst,setRst]=useState(false);
  const [hist,setHist]=useState([]);
  const [sci,setSci]=useState(false);
  const [deg,setDeg]=useState(true);

  const inp=d=>{setDisp(p=>(rst||p==='0')?String(d):(p.length>=13?p:p+d));setRst(false);};
  const dot=()=>{if(rst){setDisp('0.');setRst(false);return;}if(!disp.includes('.'))setDisp(p=>p+'.');};
  const setOper=o=>{setPrev(+disp);setOp(o);setExpr(`${disp} ${o}`);setRst(true);};
  const calc=()=>{
    if(prev===null||!op)return;
    const c=+disp,p=prev,m={'+':p+c,'-':p-c,'×':p*c,'÷':c?p/c:'Err','%':p%c,'xʸ':Math.pow(p,c)};
    const res=m[op]==='Err'?'Err':String(parseFloat((m[op]).toFixed(10)));
    setHist(h=>[`${p} ${op} ${c} = ${res}`,...h.slice(0,5)]);
    setExpr('');setDisp(res);setPrev(null);setOp(null);setRst(true);
  };
  const clr=()=>{setDisp('0');setPrev(null);setOp(null);setRst(false);setExpr('');};
  const neg=()=>setDisp(String(-+disp));
  const pct=()=>setDisp(String(+disp/100));
  const sqrt_=()=>setDisp(String(parseFloat(Math.sqrt(+disp).toFixed(10))));
  const sq=()=>setDisp(String(parseFloat(Math.pow(+disp,2).toFixed(10))));
  const inv=()=>{const v=1/+disp;setDisp(isFinite(v)?String(parseFloat(v.toFixed(10))):'Err');};
  const toR=a=>deg?a*Math.PI/180:a;
  const trig=fn=>setDisp(String(parseFloat(fn(toR(+disp)).toFixed(10))));
  const log_=()=>setDisp(String(parseFloat(Math.log10(+disp).toFixed(10))));
  const ln_=()=>setDisp(String(parseFloat(Math.log(+disp).toFixed(10))));
  const pi_=()=>{setDisp(String(Math.PI));setRst(false);};
  const e_=()=>{setDisp(String(Math.E));setRst(false);};
  const fact=n=>n<=1?1:n*fact(n-1);
  const fact_=()=>{const v=+disp;if(v>=0&&Number.isInteger(v)&&v<=20)setDisp(String(fact(v)));};

  const BC=(lbl,t,fn,wide=false)=>{
    const cls={
      op:'bg-amber-400 hover:bg-amber-300 text-white font-bold text-xl shadow active:scale-95',
      func:'bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold text-base active:scale-95',
      sci:'bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-semibold text-xs active:scale-95',
      eq:'bg-blue-600 hover:bg-blue-500 text-white font-bold text-xl shadow-lg active:scale-95',
      num:'bg-white hover:bg-slate-50 text-slate-800 font-medium text-xl shadow-sm border border-slate-100 active:scale-95'
    }[t];
    return <button key={lbl} onClick={fn} className={`h-12 rounded-2xl transition-all ${cls} ${wide?'col-span-2':''}`}>{lbl}</button>;
  };

  return(
    <div className="flex flex-col h-full bg-slate-100">
      <div className="bg-slate-800 px-5 pt-3 pb-2 flex flex-col items-end shrink-0">
        <div className="text-slate-400 text-xs h-4 mb-0.5 truncate max-w-full">{expr}</div>
        <div className="text-white font-light truncate max-w-full" style={{fontSize:disp.length>10?'1.8rem':'2.4rem'}}>{disp}</div>
        <div className="flex items-center gap-2 mt-1">
          <button onClick={()=>setSci(s=>!s)} className={`text-[10px] px-2 py-0.5 rounded-full transition-colors ${sci?'bg-indigo-500 text-white':'bg-white/10 text-slate-400 hover:bg-white/20'}`}>SCI</button>
          {sci&&<button onClick={()=>setDeg(d=>!d)} className="text-[10px] px-2 py-0.5 rounded-full bg-white/10 text-slate-400 hover:bg-white/20 transition-colors">{deg?'DEG':'RAD'}</button>}
        </div>
      </div>
      {hist.length>0&&<div className="bg-slate-700/50 px-4 py-1 max-h-16 overflow-y-auto shrink-0">
        {hist.map((h,i)=><div key={i} className="text-xs text-slate-400 text-right">{h}</div>)}
      </div>}
      {sci?(
        <div className="flex-1 grid grid-cols-5 gap-1.5 p-2.5">
          {BC('sin','sci',()=>trig(Math.sin))}{BC('cos','sci',()=>trig(Math.cos))}{BC('tan','sci',()=>trig(Math.tan))}{BC('log','sci',log_)}{BC('ln','sci',ln_)}
          {BC('x²','sci',sq)}{BC('√','sci',sqrt_)}{BC('1/x','sci',inv)}{BC('π','sci',pi_)}{BC('e','sci',e_)}
          {BC('n!','sci',fact_)}{BC('AC','func',clr)}{BC('+/-','func',neg)}{BC('%','func',pct)}{BC('÷','op',()=>setOper('÷'))}
          {BC('7','num',()=>inp(7))}{BC('8','num',()=>inp(8))}{BC('9','num',()=>inp(9))}{BC('×','op',()=>setOper('×'))}{BC('xʸ','op',()=>setOper('xʸ'))}
          {BC('4','num',()=>inp(4))}{BC('5','num',()=>inp(5))}{BC('6','num',()=>inp(6))}{BC('-','op',()=>setOper('-'))}{BC('(',null,()=>{})}
          {BC('1','num',()=>inp(1))}{BC('2','num',()=>inp(2))}{BC('3','num',()=>inp(3))}{BC('+','op',()=>setOper('+'))}{BC(')',null,()=>{})}
          {BC('0','num',()=>inp(0),true)}{BC('.','num',dot)}{BC('=','eq',calc,true)}
        </div>
      ):(
        <div className="flex-1 grid grid-cols-4 gap-2 p-3">
          {BC('AC','func',clr)}{BC('+/-','func',neg)}{BC('%','func',pct)}{BC('÷','op',()=>setOper('÷'))}
          {BC('7','num',()=>inp(7))}{BC('8','num',()=>inp(8))}{BC('9','num',()=>inp(9))}{BC('×','op',()=>setOper('×'))}
          {BC('4','num',()=>inp(4))}{BC('5','num',()=>inp(5))}{BC('6','num',()=>inp(6))}{BC('-','op',()=>setOper('-'))}
          {BC('1','num',()=>inp(1))}{BC('2','num',()=>inp(2))}{BC('3','num',()=>inp(3))}{BC('+','op',()=>setOper('+'))}
          {BC('√','func',sqrt_)}{BC('0','num',()=>inp(0))}{BC('.','num',dot)}{BC('=','eq',calc)}
        </div>
      )}
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Snake  (speed + bonus + persistent hi)
// ══════════════════════════════════════════════
const SnakeApp=()=>{
  const G=20,S=18;
  const SPEEDS=[{l:'Slow',ms:180},{l:'Normal',ms:115},{l:'Fast',ms:70},{l:'Insane',ms:35}];
  const [snake,setSnake]=useState([{x:10,y:10},{x:9,y:10},{x:8,y:10}]);
  const [food,setFood]=useState({x:15,y:15});
  const [bonus,setBonus]=useState(null);
  const [run,setRun]=useState(false);
  const [dead,setDead]=useState(false);
  const [score,setScore]=useState(0);
  const [hi,setHi]=useState(()=>+localStorage.getItem('snake-hi')||0);
  const [spd,setSpd]=useState(1);
  const dRef=useRef({x:1,y:0});
  const rndF=useCallback(s=>{let f;do{f={x:Math.floor(Math.random()*G),y:Math.floor(Math.random()*G)}}while(s.some(b=>b.x===f.x&&b.y===f.y));return f;},[]);

  useEffect(()=>{
    if(!run)return;
    const id=setInterval(()=>{
      setSnake(prev=>{
        const d=dRef.current,h={x:(prev[0].x+d.x+G)%G,y:(prev[0].y+d.y+G)%G};
        if(prev.some(b=>b.x===h.x&&b.y===h.y)){
          setRun(false);setDead(true);
          setHi(x=>{const nh=Math.max(x,score);localStorage.setItem('snake-hi',nh);return nh;});
          return prev;
        }
        const af=h.x===food.x&&h.y===food.y;
        const ab=bonus&&h.x===bonus.x&&h.y===bonus.y;
        const ns=[h,...prev.slice(0,(af||ab)?prev.length:prev.length-1)];
        if(af){setScore(s=>s+10);setFood(rndF(ns));if(Math.random()>.65){setBonus(rndF([...ns,food]));setTimeout(()=>setBonus(null),5000);}}
        if(ab){setScore(s=>s+50);setBonus(null);}
        return ns;
      });
    },SPEEDS[spd].ms);
    return()=>clearInterval(id);
  },[run,food,bonus,score,rndF,spd]);

  useEffect(()=>{
    const h=e=>{
      const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
      const nd=m[e.code];
      if(nd&&!(nd.x===-dRef.current.x&&nd.y===-dRef.current.y)){e.preventDefault();dRef.current=nd;}
      if(e.code==='Space'){e.preventDefault();if(dead)restart();else setRun(r=>!r);}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[dead]);

  const restart=()=>{const s=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];setSnake(s);dRef.current={x:1,y:0};setFood(rndF(s));setBonus(null);setScore(0);setDead(false);setRun(true);};

  return(
    <div className="flex flex-col h-full bg-gray-900 items-center justify-center gap-2 p-2">
      <div className="flex gap-6 text-sm font-mono text-white">
        <span>SCORE: <span className="text-green-400 font-bold">{score}</span></span>
        <span>BEST: <span className="text-yellow-400 font-bold">{hi}</span></span>
        <span>LEN: <span className="text-blue-400 font-bold">{snake.length}</span></span>
      </div>
      <div className="flex gap-1">
        {SPEEDS.map((sp,i)=><button key={i} onClick={()=>setSpd(i)} className={`px-2.5 py-0.5 rounded-full text-xs font-semibold transition-all ${spd===i?'bg-green-500 text-white':'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>{sp.l}</button>)}
      </div>
      <div className="relative rounded border border-green-900/50" style={{width:G*S,height:G*S,background:'#0d1117'}}>
        {[...Array(G)].map((_,r)=>[...Array(G)].map((_,c)=><div key={`${r}-${c}`} className="absolute w-px h-px rounded-full bg-white/5" style={{left:c*S+S/2,top:r*S+S/2}}/>))}
        {snake.map((b,i)=><div key={i} className="absolute rounded-sm" style={{left:b.x*S+1,top:b.y*S+1,width:S-2,height:S-2,background:i===0?'#4ade80':`hsl(${120-i*1.5},65%,${42-i*.3}%)`}}/>)}
        <div className="absolute rounded-full animate-pulse" style={{left:food.x*S+3,top:food.y*S+3,width:S-6,height:S-6,background:'#f87171',boxShadow:'0 0 10px #f87171'}}/>
        {bonus&&<div className="absolute rounded-full animate-bounce flex items-center justify-center text-xs" style={{left:bonus.x*S+2,top:bonus.y*S+2,width:S-4,height:S-4,background:'#fbbf24',boxShadow:'0 0 12px #fbbf24'}}>★</div>}
        {(!run||dead)&&<div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center gap-3 rounded backdrop-blur-sm">
          {dead&&<><div className="text-red-400 text-2xl font-black">GAME OVER</div><div className="text-white/60 text-sm">Score: {score}</div>{score>0&&score>=hi&&<div className="text-yellow-400 text-xs font-bold">🏆 High Score!</div>}</>}
          <button onClick={restart} className="px-7 py-2 bg-green-500 text-white rounded-full font-bold text-sm hover:bg-green-400 transition-colors">{dead?'Play Again':'Start Game'}</button>
        </div>}
      </div>
      <div className="grid grid-cols-3 gap-1" style={{gridTemplateRows:'repeat(3,36px)',width:116}}>
        <div/><button className="bg-slate-700 text-white rounded-lg hover:bg-slate-600 active:bg-slate-500 text-base" onClick={()=>window.dispatchEvent(new KeyboardEvent('keydown',{code:'ArrowUp'}))}>↑</button><div/>
        <button className="bg-slate-700 text-white rounded-lg hover:bg-slate-600 active:bg-slate-500 text-base" onClick={()=>window.dispatchEvent(new KeyboardEvent('keydown',{code:'ArrowLeft'}))}>←</button>
        <button className="bg-green-700 text-white rounded-lg text-xs font-semibold hover:bg-green-600" onClick={()=>dead?restart():setRun(r=>!r)}>{run?'⏸':dead?'↺':'▶'}</button>
        <button className="bg-slate-700 text-white rounded-lg hover:bg-slate-600 active:bg-slate-500 text-base" onClick={()=>window.dispatchEvent(new KeyboardEvent('keydown',{code:'ArrowRight'}))}>→</button>
        <div/><button className="bg-slate-700 text-white rounded-lg hover:bg-slate-600 active:bg-slate-500 text-base" onClick={()=>window.dispatchEvent(new KeyboardEvent('keydown',{code:'ArrowDown'}))}>↓</button><div/>
      </div>
      <div className="text-xs text-gray-600">WASD · Space to pause · ★ = 50pts bonus</div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Paint  (shapes + opacity + undo)
// ══════════════════════════════════════════════
const PaintApp=()=>{
  const cvRef=useRef(null);
  const [tool,setTool]=useState('pen');
  const [color,setColor]=useState('#1e293b');
  const [size,setSize]=useState(6);
  const [opacity,setOpacity]=useState(1);
  const [fillSh,setFillSh]=useState(false);
  const drawing=useRef(false),last=useRef(null),sp=useRef(null);
  const [undoStack,setUndoStack]=useState([]);
  const ntf=useNtf();

  useEffect(()=>{const cv=cvRef.current;cv.width=720;cv.height=390;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);},[]);

  const saveState=()=>{const cv=cvRef.current;setUndoStack(s=>[...s.slice(-19),cv.toDataURL()]);};
  const getP=e=>{const r=cvRef.current.getBoundingClientRect(),src=e.touches?e.touches[0]:e,sx=cvRef.current.width/r.width,sy=cvRef.current.height/r.height;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};};

  const startDraw=e=>{
    e.preventDefault();drawing.current=true;const p=getP(e);last.current=p;sp.current=p;saveState();
    if(tool==='fill'){const ctx=cvRef.current.getContext('2d');ctx.globalAlpha=opacity;ctx.fillStyle=color;ctx.fillRect(0,0,cvRef.current.width,cvRef.current.height);ctx.globalAlpha=1;return;}
    if(tool==='pen'||tool==='eraser'){
      const ctx=cvRef.current.getContext('2d');ctx.globalAlpha=tool==='eraser'?1:opacity;
      ctx.beginPath();ctx.arc(p.x,p.y,size/2,0,Math.PI*2);ctx.fillStyle=tool==='eraser'?'#fff':color;ctx.fill();ctx.globalAlpha=1;
    }
  };
  const drawMove=e=>{
    e.preventDefault();if(!drawing.current)return;
    const ctx=cvRef.current.getContext('2d'),p=getP(e);
    if(tool==='pen'||tool==='eraser'){
      ctx.globalAlpha=tool==='eraser'?1:opacity;
      ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=tool==='eraser'?'#fff':color;ctx.lineWidth=tool==='eraser'?size*4:size;
      ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();ctx.globalAlpha=1;
    }
    last.current=p;
  };
  const endDraw=e=>{
    if(!drawing.current)return;drawing.current=false;
    if(!e||!sp.current)return;
    const p=getP(e),spos=sp.current;
    const ctx=cvRef.current.getContext('2d');
    ctx.globalAlpha=opacity;ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=size;ctx.lineCap='round';
    if(tool==='line'){ctx.beginPath();ctx.moveTo(spos.x,spos.y);ctx.lineTo(p.x,p.y);ctx.stroke();}
    else if(tool==='rect'){const w=p.x-spos.x,h=p.y-spos.y;fillSh?ctx.fillRect(spos.x,spos.y,w,h):ctx.strokeRect(spos.x,spos.y,w,h);}
    else if(tool==='circle'){const rx=Math.abs(p.x-spos.x)/2,ry=Math.abs(p.y-spos.y)/2,cx=(spos.x+p.x)/2,cy=(spos.y+p.y)/2;ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);fillSh?ctx.fill():ctx.stroke();}
    ctx.globalAlpha=1;
  };
  const undo=()=>{if(!undoStack.length)return;const prev=undoStack[undoStack.length-1];setUndoStack(s=>s.slice(0,-1));const img=new Image();img.src=prev;img.onload=()=>{const ctx=cvRef.current.getContext('2d');ctx.clearRect(0,0,cvRef.current.width,cvRef.current.height);ctx.drawImage(img,0,0);};};
  const clear=()=>{saveState();const ctx=cvRef.current.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cvRef.current.width,cvRef.current.height);};
  const save=()=>{const a=document.createElement('a');a.download='painting.png';a.href=cvRef.current.toDataURL();a.click();ntf('Saved!','Image saved as PNG','success');};

  const PAL=['#1e293b','#ffffff','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#78716c','#fde68a','#a3e635','#fb923c'];
  const TOOLS=[{id:'pen',e:'✏️',l:'Pen'},{id:'eraser',e:'🧹',l:'Eraser'},{id:'line',e:'╱',l:'Line'},{id:'rect',e:'▭',l:'Rect'},{id:'circle',e:'○',l:'Circle'},{id:'fill',e:'🪣',l:'Fill'}];

  return(
    <div className="flex flex-col h-full">
      <div className="flex items-center gap-1.5 px-2 py-1.5 bg-gray-100 border-b border-gray-200 flex-wrap shrink-0">
        {TOOLS.map(t=>(
          <button key={t.id} onClick={()=>setTool(t.id)} title={t.l}
            className={`h-8 px-2 rounded-lg text-sm flex items-center gap-1 transition-all ${tool===t.id?'bg-blue-500 text-white shadow ring-2 ring-blue-300':'hover:bg-gray-200 text-gray-700'}`}>
            <span>{t.e}</span><span className="text-xs hidden sm:inline">{t.l}</span>
          </button>
        ))}
        {(tool==='rect'||tool==='circle')&&(
          <button onClick={()=>setFillSh(f=>!f)} className={`h-8 px-2 rounded-lg text-xs transition-all ${fillSh?'bg-gray-700 text-white':'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>{fillSh?'Filled':'Stroke'}</button>
        )}
        <div className="w-px h-6 bg-gray-300"/>
        {PAL.map(c=><button key={c} onClick={()=>setColor(c)} className={`w-6 h-6 rounded-full border-2 transition-transform hover:scale-110 ${color===c?'border-blue-500 scale-110':'border-white'}`} style={{background:c,boxShadow:c==='#ffffff'?'inset 0 0 0 1px #d1d5db':''}}/>)}
        <input type="color" value={color} onChange={e=>setColor(e.target.value)} className="w-7 h-7 rounded cursor-pointer border-0" title="Custom"/>
        <div className="w-px h-6 bg-gray-300"/>
        <div className="flex items-center gap-1 text-xs text-gray-500">
          <span>Size:</span><input type="range" min="1" max="50" value={size} onChange={e=>setSize(+e.target.value)} className="w-16 accent-blue-500"/><span className="w-4 text-center font-mono">{size}</span>
        </div>
        <div className="flex items-center gap-1 text-xs text-gray-500">
          <span>α:</span><input type="range" min="0.1" max="1" step="0.1" value={opacity} onChange={e=>setOpacity(+e.target.value)} className="w-12 accent-blue-500"/>
        </div>
        <div className="ml-auto flex gap-1">
          <button onClick={undo} disabled={!undoStack.length} className="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 disabled:opacity-30 rounded transition-colors">↩ Undo</button>
          <button onClick={clear} className="px-2 py-1 text-xs bg-red-50 text-red-600 hover:bg-red-100 rounded transition-colors">Clear</button>
          <button onClick={save} className="px-2 py-1 text-xs bg-green-50 text-green-600 hover:bg-green-100 rounded transition-colors">💾 Save</button>
        </div>
      </div>
      <div className="flex-1 overflow-hidden bg-gray-300 flex items-center justify-center">
        <canvas ref={cvRef} className="shadow-inner"
          style={{cursor:'crosshair',maxWidth:'100%',maxHeight:'100%'}}
          onMouseDown={startDraw} onMouseMove={drawMove} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={drawMove} onTouchEnd={endDraw}/>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Calendar  (+ event notes)
// ══════════════════════════════════════════════
const CalendarApp=()=>{
  const [now,setNow]=useState(new Date());
  const [view,setView]=useState(new Date());
  const [events,setEvents]=useState({});
  const [addDay,setAddDay]=useState(null);
  const [evTxt,setEvTxt]=useState('');
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);
  const y=view.getFullYear(),m=view.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const hd=(now.getHours()%12)*30+(now.getMinutes()*.5),md=now.getMinutes()*6,sd=now.getSeconds()*6;
  const arm=(deg,len,sw,col)=>{const a=deg*Math.PI/180;return<line x1="60" y1="60" x2={60+len*Math.sin(a)} y2={60-len*Math.cos(a)} stroke={col} strokeWidth={sw} strokeLinecap="round"/>;};
  const addEv=()=>{if(!evTxt.trim())return;const k=`${y}-${m}-${addDay}`;setEvents(ev=>({...ev,[k]:[...(ev[k]||[]),evTxt.trim()]}));setAddDay(null);setEvTxt('');};
  return(
    <div className="flex flex-col h-full bg-gradient-to-br from-indigo-950 to-slate-900 text-white overflow-auto">
      <div className="flex flex-col items-center pt-5 pb-3 shrink-0">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="56" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.15)" strokeWidth="1.5"/>
          {[...Array(12)].map((_,i)=>{const a=(i*30-90)*Math.PI/180;return<line key={i} x1={60+48*Math.cos(a)} y1={60+48*Math.sin(a)} x2={60+53*Math.cos(a)} y2={60+53*Math.sin(a)} stroke="rgba(255,255,255,.4)" strokeWidth={i%3===0?2:1}/>;} )}
          {arm(hd,27,3,'white')}{arm(md,38,2,'rgba(255,255,255,.85)')}{arm(sd,44,1.5,'#f87171')}
          <circle cx="60" cy="60" r="2.5" fill="white"/>
        </svg>
        <div className="text-3xl font-mono mt-1">{now.toLocaleTimeString()}</div>
        <div className="text-sm text-white/50 mt-0.5">{now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      </div>
      <div className="mx-4 mb-3 bg-white/10 rounded-2xl p-3 backdrop-blur-sm">
        <div className="flex items-center justify-between mb-2">
          <button onClick={()=>setView(d=>new Date(d.getFullYear(),d.getMonth()-1,1))} className="p-1 hover:bg-white/20 rounded-lg transition-colors">◀</button>
          <div className="font-semibold text-sm">{MN[m]} {y}</div>
          <button onClick={()=>setView(d=>new Date(d.getFullYear(),d.getMonth()+1,1))} className="p-1 hover:bg-white/20 rounded-lg transition-colors">▶</button>
        </div>
        <div className="grid grid-cols-7 gap-0.5 text-center">
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="text-[11px] font-bold text-white/40 py-1">{d}</div>)}
          {[...Array(first)].map((_,i)=><div key={`e${i}`}/>)}
          {[...Array(days)].map((_,i)=>{
            const day=i+1,today=day===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
            const hasEv=!!(events[`${y}-${m}-${day}`]?.length);
            return<div key={day} onClick={()=>setAddDay(day)} className={`text-xs py-1.5 rounded-lg cursor-pointer relative select-none ${today?'bg-blue-500 font-bold':'hover:bg-white/10 text-white/80'}`}>
              {day}{hasEv&&<span className="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-yellow-400 block"/>}
            </div>;
          })}
        </div>
      </div>
      {addDay&&<div className="mx-4 mb-3 bg-white/10 rounded-xl p-3 backdrop-blur-sm">
        <div className="text-xs font-semibold mb-2 text-white/70">Add note for {MN[m]} {addDay}</div>
        {(events[`${y}-${m}-${addDay}`]||[]).map((ev,i)=><div key={i} className="text-xs text-yellow-300 mb-1 flex items-center gap-1"><span className="opacity-50">•</span>{ev}</div>)}
        <div className="flex gap-2">
          <input autoFocus value={evTxt} onChange={e=>setEvTxt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addEv();if(e.key==='Escape')setAddDay(null);}}
            placeholder="Add note..." className="flex-1 bg-white/20 rounded-lg px-2 py-1 text-xs text-white placeholder-white/40 outline-none focus:bg-white/30"/>
          <button onClick={addEv} className="px-3 py-1 bg-blue-500 text-white text-xs rounded-lg hover:bg-blue-400 transition-colors">Add</button>
          <button onClick={()=>setAddDay(null)} className="text-white/40 hover:text-white text-xs px-1">✕</button>
        </div>
      </div>}
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Weather  (+ 5-day forecast)
// ══════════════════════════════════════════════
const WeatherApp=()=>{
  const [data,setData]=useState(null);
  const [inp,setInp]=useState('London');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const fetch_=c=>{
    setLoading(true);setErr(null);
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(c)}&count=1`)
      .then(r=>r.json()).then(gd=>{
        if(!gd.results?.length)throw new Error('City not found');
        const{latitude,longitude,name,country}=gd.results[0];
        return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,weather_code&forecast_days=5`)
          .then(r=>r.json()).then(wd=>setData({...wd.current,city:name,country,hourly:wd.hourly,daily:wd.daily}));
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  };
  useEffect(()=>{fetch_('London');},[]);
  const icon=c=>c===0?'☀️':c<=3?'⛅':c<=48?'🌫️':c<=57?'🌦️':c<=67?'🌧️':c<=77?'❄️':c<=82?'🌧️':'⛈️';
  const desc=c=>c===0?'Clear Sky':c<=3?'Partly Cloudy':c<=48?'Foggy':c<=57?'Drizzle':c<=67?'Rainy':c<=77?'Snowy':c<=82?'Showers':'Thunderstorm';
  return(
    <div className="flex flex-col h-full bg-gradient-to-br from-sky-400 to-blue-700 text-white">
      <div className="p-3 flex gap-2 shrink-0">
        <input className="flex-1 rounded-xl px-3 py-1.5 bg-white/25 border border-white/40 placeholder-white/60 text-sm outline-none focus:bg-white/35 transition-colors" placeholder="Search city..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&fetch_(inp)}/>
        <button onClick={()=>fetch_(inp)} className="px-4 py-1.5 bg-white/25 hover:bg-white/35 rounded-xl text-sm font-semibold transition-colors">Search</button>
      </div>
      {loading&&<div className="flex-1 flex items-center justify-center text-5xl animate-pulse">🌤️</div>}
      {err&&<div className="flex-1 flex items-center justify-center text-white/70">{err}</div>}
      {data&&!loading&&(
        <div className="flex-1 flex flex-col items-center px-4 pb-4 overflow-auto">
          <div className="text-7xl mb-1">{icon(data.weather_code)}</div>
          <div className="text-5xl font-thin mb-1">{Math.round(data.temperature_2m)}°C</div>
          <div className="text-sm text-white/70 mb-0.5">Feels like {Math.round(data.apparent_temperature)}°C</div>
          <div className="text-lg font-semibold mb-0.5">{desc(data.weather_code)}</div>
          <div className="text-sm text-white/80 mb-3">{data.city}, {data.country}</div>
          <div className="w-full grid grid-cols-2 gap-2 mb-3">
            {[{e:'💧',l:'Humidity',v:`${data.relative_humidity_2m}%`},{e:'💨',l:'Wind',v:`${data.wind_speed_10m} km/h`}].map(x=>(
              <div key={x.l} className="bg-white/20 rounded-xl p-3 backdrop-blur-sm"><div className="text-2xl mb-0.5">{x.e}</div><div className="text-xs text-white/60">{x.l}</div><div className="font-semibold">{x.v}</div></div>
            ))}
          </div>
          {data.daily&&<div className="w-full bg-white/15 rounded-xl p-3 mb-2">
            <div className="text-[10px] font-bold text-white/60 mb-2 tracking-wider">5-DAY FORECAST</div>
            {data.daily.time?.slice(0,5).map((t,i)=>(
              <div key={i} className="flex items-center gap-2 text-sm mb-1.5">
                <span className="text-white/60 w-9 text-xs">{new Date(t).toLocaleDateString('en-US',{weekday:'short'})}</span>
                <span className="text-base">{icon(data.daily.weather_code?.[i]||0)}</span>
                <span className="text-blue-200 text-xs w-8">{Math.round(data.daily.temperature_2m_min?.[i]||0)}°</span>
                <div className="flex-1 h-1.5 bg-white/20 rounded-full overflow-hidden">
                  <div className="h-full bg-white/60 rounded-full" style={{width:`${Math.min(100,Math.abs((data.daily.temperature_2m_max?.[i]||0)-(data.daily.temperature_2m_min?.[i]||0))*3)}%`}}/>
                </div>
                <span className="font-semibold text-xs w-8 text-right">{Math.round(data.daily.temperature_2m_max?.[i]||0)}°</span>
              </div>
            ))}
          </div>}
          <div className="w-full bg-white/15 rounded-xl p-2 overflow-x-auto">
            <div className="flex gap-4 min-w-max">
              {data.hourly.time.slice(0,12).map((t,i)=>(
                <div key={i} className="flex flex-col items-center text-xs gap-0.5">
                  <div className="text-white/60">{new Date(t).getHours()}h</div>
                  <div>🌡️</div>
                  <div className="font-semibold">{Math.round(data.hourly.temperature_2m[i])}°</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ══════════════════════════════════════════════

const ChatApp=()=>{

  const send=async()=>{
    if(!inp.trim()||loading)return;
    const um={role:'user',content:inp.trim()};
    const nm=[...msgs,um];setMsgs(nm);setInp('');setLoading(true);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:nm.map(m=>({role:m.role,content:m.content}))})});

        <div ref={bottomRef}/>
      </div>
      {msgs.length===1&&<div className="px-3 pb-2 flex flex-wrap gap-1.5">{suggestions.map(s=><button key={s} onClick={()=>setInp(s)} className="px-2.5 py-1 bg-violet-50 text-violet-700 text-xs rounded-full hover:bg-violet-100 transition-colors border border-violet-100">{s}</button>)}</div>}
      <div className="border-t border-gray-200 p-2.5 flex gap-2 shrink-0 bg-white">
        <input className="flex-1 rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none focus:border-violet-400 focus:ring-1 focus:ring-violet-200 transition-all" placeholder="Message Claude..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}/>
        <button onClick={send} disabled={loading||!inp.trim()} className="w-9 h-9 bg-violet-600 text-white rounded-xl flex items-center justify-center hover:bg-violet-500 disabled:opacity-40 transition-colors shrink-0"><Send size={14}/></button>

// ══════════════════════════════════════════════
//  APP: Files  (+ rename)
// ══════════════════════════════════════════════
const FilesApp=({onOpenInNotepad})=>{
  const {fs,getFolder,createFile,createFolder,deleteNode,renameNode}=useFS();
  const [path,setPath]=useState([]);
  const [sel,setSel]=useState(null);
  const [creating,setCreating]=useState(null);
  const [newName,setNewName]=useState('');
  const [renaming,setRenaming]=useState(null);
  const [renTxt,setRenTxt]=useState('');
  const [viewMode,setViewMode]=useState('grid');
  const folder=getFolder(path);
  const items=folder?Object.entries(folder).map(([name,node])=>({name,...node})).sort((a,b)=>{if(a.type==='folder'&&b.type!=='folder')return-1;if(a.type!=='folder'&&b.type==='folder')return 1;return a.name.localeCompare(b.name);}):[];
  const open=item=>{if(item.type==='folder'){setPath([...path,item.name]);setSel(null);}else if(item.ext==='txt')onOpenInNotepad?.(item.content,item.name);};
  const goUp=()=>{setPath(p=>p.slice(0,-1));setSel(null);};
  const doCreate=()=>{if(!newName.trim()){setCreating(null);return;}creating==='file'?createFile(path,newName.trim()):createFolder(path,newName.trim());setCreating(null);setNewName('');};
  const doDelete=name=>{if(confirm(`Delete "${name}"?`)){deleteNode(path,name);setSel(null);}};
  const doRename=()=>{if(!renTxt.trim()){setRenaming(null);return;}renameNode(path,renaming,renTxt.trim());setRenaming(null);setSel(renTxt.trim());};
  const fIcon=item=>item.type==='folder'?'📁':{txt:'📄',md:'📝',png:'🖼️',jpg:'🖼️',html:'🌐',js:'⚙️'}[item.ext]||'📃';
  return(
    <div className="flex flex-col h-full bg-white">
      <div className="border-b border-gray-200 px-2 py-1.5 flex items-center gap-1.5 bg-gray-50 shrink-0">
        <button onClick={goUp} disabled={path.length===0} className="p-1.5 rounded hover:bg-gray-200 disabled:opacity-30 transition-colors text-sm">⬆</button>
        <div className="flex-1 flex items-center gap-0.5 bg-white rounded-lg px-2 py-1 border border-gray-200 text-xs text-gray-600 min-w-0">
          <button onClick={()=>setPath([])} className="hover:text-blue-600 font-semibold shrink-0">Home</button>
          {path.map((p,i)=><React.Fragment key={i}><span className="text-gray-300 shrink-0">/</span><button onClick={()=>setPath(path.slice(0,i+1))} className="hover:text-blue-600 truncate">{p}</button></React.Fragment>)}
        </div>
        <button onClick={()=>setCreating('folder')} title="New Folder" className="p-1.5 rounded hover:bg-yellow-50 transition-colors"><Folder size={15} className="text-yellow-500"/></button>
        <button onClick={()=>setCreating('file')} title="New File" className="p-1.5 rounded hover:bg-blue-50 transition-colors"><File size={15} className="text-blue-500"/></button>
        <button onClick={()=>setViewMode(v=>v==='grid'?'list':'grid')} className="p-1.5 rounded hover:bg-gray-200 transition-colors text-gray-500 text-xs font-bold">{viewMode==='grid'?'≡':'⊞'}</button>
      </div>
      {creating&&<div className="px-3 py-2 bg-blue-50 border-b border-blue-100 flex gap-2 items-center shrink-0">
        <span className="text-xs font-semibold text-blue-700">New {creating}:</span>
        <input autoFocus className="flex-1 text-sm border border-blue-300 rounded-lg px-2 py-1 outline-none" placeholder={creating==='file'?'filename.txt':'Folder Name'} value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doCreate();if(e.key==='Escape')setCreating(null);}}/>
        <button onClick={doCreate} className="px-3 py-1 bg-blue-500 text-white text-xs rounded-lg hover:bg-blue-600 transition-colors">Create</button>
        <button onClick={()=>setCreating(null)} className="px-3 py-1 bg-gray-200 text-xs rounded-lg">Cancel</button>
      </div>}
      <div className="flex-1 overflow-auto p-3">
        {items.length===0?<div className="flex flex-col items-center justify-center h-full text-gray-300 gap-2"><FolderOpen size={52}/><p className="text-gray-400 text-sm">Empty folder</p></div>
        :viewMode==='grid'?<div className="grid grid-cols-5 gap-2">
          {items.map(item=>(
            <div key={item.name} onClick={()=>setSel(item.name)} onDoubleClick={()=>open(item)}
              className={`flex flex-col items-center p-2 rounded-xl cursor-pointer transition-all ${sel===item.name?'bg-blue-100 ring-2 ring-blue-400':'hover:bg-gray-50'}`}>
              <div className="text-3xl mb-1">{fIcon(item)}</div>
              {renaming===item.name?(
                <input autoFocus value={renTxt} onChange={e=>setRenTxt(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')doRename();if(e.key==='Escape')setRenaming(null);}}
                  className="text-[10px] text-center w-full bg-white border border-blue-400 rounded px-1 py-0.5 outline-none" onClick={e=>e.stopPropagation()}/>
              ):(
                <div className="text-[11px] text-center text-gray-700 font-medium truncate w-full">{item.name}</div>
              )}
              {sel===item.name&&renaming!==item.name&&<div className="flex gap-1 mt-1">
                {item.type==='file'&&item.ext==='txt'&&<button onClick={e=>{e.stopPropagation();open(item);}} className="text-[10px] bg-blue-500 text-white px-1.5 py-0.5 rounded-md">Open</button>}
                <button onClick={e=>{e.stopPropagation();setRenaming(item.name);setRenTxt(item.name);}} className="text-[10px] bg-amber-500 text-white px-1.5 py-0.5 rounded-md">Rename</button>
                <button onClick={e=>{e.stopPropagation();doDelete(item.name);}} className="text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded-md">Del</button>
              </div>}
            </div>
          ))}
        </div>
        :<table className="w-full text-sm"><thead><tr className="border-b border-gray-200"><th className="text-left py-1.5 pr-4 text-xs text-gray-500 font-semibold">Name</th><th className="text-left py-1.5 text-xs text-gray-500 font-semibold">Type</th></tr></thead><tbody>
          {items.map(item=><tr key={item.name} onClick={()=>setSel(item.name)} onDoubleClick={()=>open(item)} className={`cursor-pointer border-b border-gray-50 transition-colors ${sel===item.name?'bg-blue-50':'hover:bg-gray-50'}`}><td className="py-1.5 pr-4"><div className="flex items-center gap-2"><span>{fIcon(item)}</span><span className="text-gray-700">{item.name}</span></div></td><td className="py-1.5 text-gray-400 text-xs">{item.type==='folder'?'Folder':(item.ext||'File').toUpperCase()}</td></tr>)}
        </tbody></table>}
      </div>
      <div className="px-3 py-1.5 border-t border-gray-200 text-xs text-gray-400 shrink-0">{items.length} item{items.length!==1?'s':''}</div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Camera
// ══════════════════════════════════════════════
const CameraApp=()=>{
  const vidRef=useRef(null),cvRef=useRef(null);
  const [stream,setStream]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [err,setErr]=useState(null);
  const [filter,setFilter]=useState('none');
  const ntf=useNtf();
  const FILTERS=[{n:'Normal',f:'none'},{n:'B&W',f:'grayscale(1)'},{n:'Sepia',f:'sepia(1)'},{n:'Vivid',f:'saturate(2)'},{n:'Invert',f:'invert(1)'},{n:'Blur',f:'blur(2px)'},{n:'HDR',f:'brightness(1.4) contrast(1.3)'}];
  const start=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:true});setStream(s);setErr(null);if(vidRef.current)vidRef.current.srcObject=s;}catch{setErr('Camera access denied.');}};
  const stop=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);};
  useEffect(()=>()=>stream?.getTracks().forEach(t=>t.stop()),[stream]);
  const snap=()=>{const cv=cvRef.current,vi=vidRef.current;cv.width=vi.videoWidth;cv.height=vi.videoHeight;const ctx=cv.getContext('2d');ctx.filter=filter;ctx.drawImage(vi,0,0);setPhoto(cv.toDataURL('image/jpeg',.95));ntf('Photo taken!','','success');};
  const save=()=>{const a=document.createElement('a');a.download=`photo_${Date.now()}.jpg`;a.href=photo;a.click();ntf('Saved!','Photo downloaded','success');};
  return(
    <div className="flex flex-col h-full bg-black text-white">
      <canvas ref={cvRef} className="hidden"/>
      <div className="flex-1 relative overflow-hidden">
        {stream?<video ref={vidRef} autoPlay playsInline className="w-full h-full object-cover" style={{filter}}/>
        :photo?<img src={photo} className="w-full h-full object-contain" alt=""/>
        :<div className="w-full h-full flex flex-col items-center justify-center gap-4 text-white/30"><Camera size={70}/>{err?<p className="text-sm text-red-400 text-center px-6">{err}</p>:<p className="text-sm">Click Start Camera</p>}</div>}
      </div>
      {stream&&<div className="bg-gray-900 px-3 py-2 flex gap-2 overflow-x-auto shrink-0">{FILTERS.map(({n,f})=><button key={n} onClick={()=>setFilter(f)} className={`flex-shrink-0 px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${filter===f?'bg-white text-black':'bg-gray-700 text-white/70 hover:bg-gray-600'}`}>{n}</button>)}</div>}
      <div className="bg-gray-950 p-3 flex items-center justify-center gap-4 shrink-0">
        {!stream?<button onClick={start} className="px-6 py-2 bg-blue-500 text-white rounded-full font-semibold hover:bg-blue-400 transition-colors">Start Camera</button>:<>
          <button onClick={stop} className="px-4 py-2 bg-gray-700 text-white rounded-full text-sm hover:bg-gray-600 transition-colors">Stop</button>
          <button onClick={snap} className="w-14 h-14 rounded-full border-4 border-white bg-white/10 hover:bg-white/20 transition-colors flex items-center justify-center"><div className="w-10 h-10 rounded-full bg-white"/></button>
        </>}
        {photo&&<button onClick={save} className="px-4 py-2 bg-green-600 text-white rounded-full text-sm hover:bg-green-500 transition-colors font-semibold">💾 Save</button>}
        {photo&&stream&&<button onClick={()=>setPhoto(null)} className="px-4 py-2 bg-gray-700 text-white rounded-full text-sm hover:bg-gray-600 transition-colors">Retake</button>}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Music  (+ shuffle + repeat)
// ══════════════════════════════════════════════
const MusicApp=()=>{
  const audRef=useRef(null);
  const [playing,setPlaying]=useState(false);
  const [progress,setProgress]=useState(0);
  const [vol,setVol]=useState(.7);
  const [idx,setIdx]=useState(0);
  const [dur,setDur]=useState(0);
  const [cur,setCur]=useState(0);
  const [shuffle,setShuffle]=useState(false);
  const [repeat,setRepeat]=useState(false);
  const TRACKS=[
    {title:'Ukulele Breeze',artist:'Bensound',col:'#6366f1',src:'https://www.bensound.com/bensound-music/bensound-ukulele.mp3'},
    {title:'Jazzy Frenchy',artist:'Bensound',col:'#ec4899',src:'https://www.bensound.com/bensound-music/bensound-jazzyfrenchy.mp3'},
    {title:'Electro Acoustic',artist:'Bensound',col:'#10b981',src:'https://www.bensound.com/bensound-music/bensound-electroaccoustic.mp3'},
    {title:'Evolution',artist:'Bensound',col:'#f59e0b',src:'https://www.bensound.com/bensound-music/bensound-evolution.mp3'},
  ];
  const t=TRACKS[idx];
  useEffect(()=>{if(audRef.current){audRef.current.src=t.src;audRef.current.volume=vol;if(playing)audRef.current.play().catch(()=>setPlaying(false));}},[idx]);
  useEffect(()=>{if(audRef.current)audRef.current.volume=vol;},[vol]);
  const toggle=()=>{const a=audRef.current;if(playing){a.pause();setPlaying(false);}else{a.play().then(()=>setPlaying(true)).catch(()=>setPlaying(false));}};
  const playTrack=i=>{setIdx(i);setTimeout(()=>{audRef.current?.play().then(()=>setPlaying(true)).catch(()=>setPlaying(false));},50);};
  const next=()=>{if(repeat){audRef.current.currentTime=0;audRef.current.play().catch(()=>{});}else if(shuffle)playTrack(Math.floor(Math.random()*TRACKS.length));else playTrack((idx+1)%TRACKS.length);};
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  return(
    <div className="flex flex-col h-full text-white" style={{background:`linear-gradient(160deg,${t.col}33 0%,#0f172a 55%)`}}>
      <audio ref={audRef} onTimeUpdate={e=>{setCur(e.target.currentTime);setProgress(e.target.duration?(e.target.currentTime/e.target.duration)*100:0);}} onLoadedMetadata={e=>setDur(e.target.duration)} onEnded={next} crossOrigin="anonymous"/>
      <div className="flex-1 flex flex-col items-center justify-center p-5">
        <div className="w-32 h-32 rounded-3xl shadow-2xl flex items-center justify-center text-5xl mb-4 shrink-0" style={{background:`linear-gradient(135deg,${t.col},${t.col}88)`,animation:playing?'spin 8s linear infinite':'none'}}>🎵</div>
        <div className="text-lg font-bold mb-0.5">{t.title}</div>

const LiquidApp=()=>{
  const COLORS=['#FF6B6B','#4ECDC4','#FFE66D','#FF9F43','#5f27cd','#54a0ff','#ff9ff3','#00d2d3','#1dd1a1'],CAP=4;
  const [level,setLevel]=useState(1);
  const [tubes,setTubes]=useState([]);
  const [sel,setSel]=useState(null);
  const [won,setWon]=useState(false);
  const [toast,setToast]=useState(null);
  const [moves,setMoves]=useState(0);
  const gen=useCallback(lvl=>{
    const nc=Math.min(3+Math.floor(lvl/3),COLORS.length);
    const t=[...Array(nc).fill(0).map((_,i)=>Array(CAP).fill(COLORS[i])),...Array(2).fill(null).map(()=>[])];
    const s=JSON.parse(JSON.stringify(t));
    for(let i=0;i<20+lvl*2;i++){const sr=Math.floor(Math.random()*s.length),dt=Math.floor(Math.random()*s.length);if(sr===dt||!s[sr].length||s[dt].length>=CAP)continue;const c=s[sr][s[sr].length-1];if(s[dt].length&&s[dt][s[dt].length-1]!==c)continue;s[dt].push(s[sr].pop());}
    setTubes(s);setWon(false);setSel(null);setMoves(0);
  },[]);
  useEffect(()=>{gen(level);},[level,gen]);
  const click=i=>{
    if(won)return;if(sel===null){if(tubes[i].length)setSel(i);return;}if(sel===i){setSel(null);return;}
    const nt=tubes.map(t=>[...t]);const src=nt[sel],dst=nt[i];if(!src.length){setSel(null);return;}
    const c=src[src.length-1];
    if(dst.length<CAP&&(dst.length===0||dst[dst.length-1]===c)){while(src.length&&dst.length<CAP&&src[src.length-1]===c)dst.push(src.pop());setTubes(nt);setSel(null);setMoves(m=>m+1);if(nt.every(t=>t.length===0||(t.length===CAP&&t.every(x=>x===t[0]))))setWon(true);}
    else{setToast('Invalid Move!');setTimeout(()=>setToast(null),1500);setSel(null);}
  };
  return(
    <div className="flex flex-col h-full bg-gradient-to-br from-slate-900 to-indigo-900 text-white relative">
      <div className="flex justify-between items-center p-4 bg-black/20 shrink-0">
        <button onClick={()=>gen(level)} className="p-2 hover:bg-white/10 rounded-full transition-colors" title="Restart"><RefreshCw size={18}/></button>
        <div className="text-center"><div className="text-lg font-bold tracking-widest text-cyan-300">LEVEL {level}</div><div className="text-xs text-white/40">{moves} moves</div></div>
        <div className="w-8"/>
      </div>
      <div className="flex-1 flex flex-wrap justify-center content-start gap-5 p-5 overflow-y-auto">
        {tubes.map((tube,i)=>(
          <div key={i} onClick={()=>click(i)} className={`relative w-12 h-40 border-4 border-white/20 border-t-0 rounded-b-3xl bg-white/5 cursor-pointer transition-all duration-200 ${sel===i?'-translate-y-4 shadow-[0_0_20px_rgba(255,255,255,.3)] border-white/60':'hover:bg-white/10'}`}>
            <div className="absolute bottom-0 w-full flex flex-col-reverse rounded-b-[18px] overflow-hidden">{tube.map((c,ci)=><div key={ci} className="w-full h-8 transition-all" style={{backgroundColor:c}}/>)}</div>
          </div>
        ))}
      </div>
      {toast&&<div className="absolute bottom-8 left-1/2 -translate-x-1/2 px-4 py-2 bg-red-500/90 text-white rounded-full text-sm font-bold animate-bounce">{toast}</div>}
      {won&&<div className="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center"><Trophy size={60} className="text-yellow-400 mb-3 afloat"/><h2 className="text-3xl font-black mb-1">COMPLETE!</h2><p className="text-white/50 text-sm mb-4">{moves} moves</p><button onClick={()=>setLevel(l=>l+1)} className="flex items-center gap-2 px-8 py-3 bg-gradient-to-r from-pink-500 to-yellow-500 rounded-full font-bold text-lg hover:scale-105 transition-transform">Next Level <Play size={18} fill="currentColor"/></button></div>}
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP: Voxel World

const VoxelApp=()=>{
  const MATERIALS=[{color:0x5da642,name:'Grass'},{color:0x593d29,name:'Dirt'},{color:0x757575,name:'Stone'},{color:0x8b5a2b,name:'Wood'},{color:0xb52020,name:'Brick'}];
  const mountRef=useRef(null);
  const [activeSlot,setActiveSlot]=useState(0);
  const [isLocked,setIsLocked]=useState(false);
  const asr=useRef(0);
  useEffect(()=>{asr.current=activeSlot;},[activeSlot]);
  useEffect(()=>{
    if(!mountRef.current)return;
    const scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);scene.fog=new THREE.Fog(0x87CEEB,10,60);
    const W=mountRef.current.clientWidth,H=mountRef.current.clientHeight;
    const camera=new THREE.PerspectiveCamera(75,W/H,.1,1000);
    const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);mountRef.current.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff,.6));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(10,20,10);scene.add(dl);
    const mats=MATERIALS.map(m=>new THREE.MeshLambertMaterial({color:m.color}));
    const geo=new THREE.BoxGeometry(1,1,1);const objs=[];
    const mkB=(x,y,z,mi)=>{const b=new THREE.Mesh(geo,mats[mi]);b.position.set(x,y,z);scene.add(b);objs.push(b);};
    for(let x=-10;x<10;x++)for(let z=-10;z<10;z++){mkB(x,0,z,0);if(Math.random()>.95){mkB(x,1,z,3);mkB(x,2,z,3);mkB(x,3,z,0);}}
    const ctrl=new PointerLockControls(camera,renderer.domElement);ctrl.getObject().position.set(0,2,5);scene.add(ctrl.getObject());
    const onL=()=>setIsLocked(true),onU=()=>setIsLocked(false);
    ctrl.addEventListener('lock',onL);ctrl.addEventListener('unlock',onU);
    mountRef.current.addEventListener('click',()=>ctrl.lock());
    let mF=false,mB=false,mL=false,mR=false,cJ=false;
    const vel=new THREE.Vector3(),dir=new THREE.Vector3();
    const onKD=e=>{switch(e.code){case 'ArrowUp':case 'KeyW':mF=true;break;case 'ArrowLeft':case 'KeyA':mL=true;break;case 'ArrowDown':case 'KeyS':mB=true;break;case 'ArrowRight':case 'KeyD':mR=true;break;case 'Space':if(cJ){vel.y+=12;cJ=false;}break;case 'Digit1':setActiveSlot(0);break;case 'Digit2':setActiveSlot(1);break;case 'Digit3':setActiveSlot(2);break;case 'Digit4':setActiveSlot(3);break;case 'Digit5':setActiveSlot(4);break;}};
    const onKU=e=>{switch(e.code){case 'ArrowUp':case 'KeyW':mF=false;break;case 'ArrowLeft':case 'KeyA':mL=false;break;case 'ArrowDown':case 'KeyS':mB=false;break;case 'ArrowRight':case 'KeyD':mR=false;break;}};
    document.addEventListener('keydown',onKD);document.addEventListener('keyup',onKU);
    const ray=new THREE.Raycaster();const mouse=new THREE.Vector2(0,0);
    const onMD=e=>{
      if(!ctrl.isLocked)return;ray.setFromCamera(mouse,camera);const its=ray.intersectObjects(objs);
      if(its.length>0){const hit=its[0];if(hit.distance>8)return;if(e.button===2){if(hit.face){const p=new THREE.Vector3().copy(hit.point).add(hit.face.normal);p.divideScalar(1).floor().multiplyScalar(1).addScalar(.5);mkB(p.x,p.y,p.z,asr.current);}}else if(e.button===0){if(hit.object.position.y>0){scene.remove(hit.object);objs.splice(objs.indexOf(hit.object),1);}}}
    };
    document.addEventListener('mousedown',onMD);
    let pT=performance.now(),aid;
    const animate=()=>{aid=requestAnimationFrame(animate);const t=performance.now(),dt=(t-pT)/1000;pT=t;if(ctrl.isLocked){vel.x-=vel.x*10*dt;vel.z-=vel.z*10*dt;vel.y-=9.8*4*dt;dir.z=Number(mF)-Number(mB);dir.x=Number(mR)-Number(mL);dir.normalize();if(mF||mB)vel.z-=dir.z*40*dt;if(mL||mR)vel.x-=dir.x*40*dt;ctrl.moveRight(-vel.x*dt);ctrl.moveForward(-vel.z*dt);ctrl.getObject().position.y+=vel.y*dt;if(ctrl.getObject().position.y<2){vel.y=0;ctrl.getObject().position.y=2;cJ=true;}}renderer.render(scene,camera);};
    animate();
    return()=>{cancelAnimationFrame(aid);document.removeEventListener('keydown',onKD);document.removeEventListener('keyup',onKU);document.removeEventListener('mousedown',onMD);ctrl.removeEventListener('lock',onL);ctrl.removeEventListener('unlock',onU);renderer.dispose();if(mountRef.current?.contains(renderer.domElement))mountRef.current.removeChild(renderer.domElement);};
  },[]);
  return(
    <div className="relative w-full h-full bg-sky-300">
      <div ref={mountRef} className="w-full h-full"/>
      {!isLocked&&<div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm"><Box size={48} className="text-white mb-3 afloat"/><p className="text-white font-bold text-xl mb-1">Voxel World</p><p className="text-white/70 text-sm mb-2">Click to start · WASD to move · Space to jump</p><p className="text-white/40 text-xs">Left click: break · Right click: place · 1-5: material</p></div>}
      {isLocked&&<>
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"><div className="w-5 h-0.5 bg-white/80 absolute top-1/2 -translate-y-1/2 -translate-x-1/2"/><div className="w-0.5 h-5 bg-white/80 absolute left-1/2 -translate-x-1/2 -translate-y-1/2"/></div>
        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-1">{MATERIALS.map((m,i)=><div key={i} className={`w-9 h-9 rounded border-2 transition-all ${activeSlot===i?'border-white scale-110':'border-white/40'}`} style={{background:`#${m.color.toString(16).padStart(6,'0')}`}} title={m.name}/>)}</div>
      </>}
    </div>
  );
};

  // Notification system
  const addNtf=useCallback((title,msg='',type='info')=>{

  const maxW=id=>setWins(p=>({...p,[id]:{...p[id],maxed:!p[id].maxed}}));
  const focusW=id=>{const nz=topZ+1;setTopZ(nz);setWins(p=>({...p,[id]:{...p[id],z:nz,min:false}}));setActiveId(id);};
  const moveW=(id,pos)=>setWins(p=>({...p,[id]:{...p[id],x:pos.x,y:pos.y}}));
  const resizeW=(id,sz)=>setWins(p=>({...p,[id]:{...p[id],cw:sz.cw,ch:sz.ch}}));

  const openInNotepad=(content,file)=>{setNpInit({content,file});openApp('notepad');};

  const filteredApps=Object.values(APPS).filter(a=>!a.isExternal&&a.title.toLowerCase().includes(search.toLowerCase()));

  const desktopCtxItems=[
    {icon:'🖼️',label:'Change Wallpaper',fn:()=>setShowWP(true)},
    {icon:'📄',label:'Open Files',fn:()=>openApp('files')},
    {sep:true},
    {icon:dark?'☀️':'🌙',label:dark?'Light Mode':'Dark Mode',fn:()=>setDark(d=>!d)},
    {icon:'⚙️',label:'Settings',fn:()=>openApp('settings')},
    {icon:'🔔',label:'Test Notification',fn:()=>addNtf('Hello!','Notification system is working 🎉','success')},
    {sep:true},
    {icon:'💻',label:'About WebOS Ultra',fn:()=>addNtf('WebOS Ultra v3.0','React · Three.js · Anthropic AI','info')},
  ];

  const appGroups={
    'Productivity':['notepad','calculator','calendar','files'],
    'Creative':['paint','camera','music'],
    'Games':['snake','liquid','voxel'],
    'Online':['weather','chat','browser'],
    'System':['settings'],
  };

  const tbBg=dark?'bg-slate-900/95 border-slate-700/60 text-white':'bg-white/90 border-white/50 text-slate-700';

  const renderApp=id=>{
    if(id==='notepad')   return <NotepadApp initContent={npInit.content} initFile={npInit.file} dark={dark}/>;
    if(id==='calculator')return <CalcApp/>;
    if(id==='snake')     return <SnakeApp/>;
    if(id==='paint')     return <PaintApp/>;
    if(id==='calendar')  return <CalendarApp/>;
    if(id==='weather')   return <WeatherApp/>;
    if(id==='chat')      return <ChatApp/>;
    if(id==='files')     return <FilesApp onOpenInNotepad={openInNotepad}/>;
    if(id==='camera')    return <CameraApp/>;
    if(id==='music')     return <MusicApp/>;
    if(id==='liquid')    return <LiquidApp/>;
    if(id==='voxel')     return <VoxelApp/>;
    if(id==='settings')  return <SettingsApp dark={dark} setDark={setDark} onShowWP={()=>setShowWP(true)}/>;
    return null;
  };

  return(
    <NtfCtx.Provider value={addNtf}>
    <div className={`w-screen h-screen overflow-hidden font-sans relative select-none ${dark?'dark':''}`}
      style={{backgroundImage:`url('${wallpaper}')`,backgroundSize:'cover',backgroundPosition:'center'}}
      onContextMenu={e=>{e.preventDefault();setCtx({x:e.clientX,y:e.clientY});setIconCtx(null);setStartOpen(false);}}
      onClick={()=>{setStartOpen(false);setCtx(null);setIconCtx(null);setShowVol(false);}}>

      {/* Desktop Icons */}
      <div className="absolute left-3 top-3 flex flex-col gap-1.5">
        {Object.values(APPS).map(app=>(
          <button key={app.id}
            onClick={()=>openApp(app.id)}
            onContextMenu={e=>{e.preventDefault();e.stopPropagation();setIconCtx({id:app.id,x:e.clientX,y:e.clientY});setCtx(null);}}
            className="group flex flex-col items-center gap-1 w-[68px] p-2 rounded-xl hover:bg-white/15 transition-colors focus:outline-none">
            <div className={`p-2.5 rounded-2xl shadow-lg text-white ${app.color} group-hover:scale-110 transition-transform`}><app.icon size={22}/></div>
            <span className="text-white text-[11px] font-medium drop-shadow-md text-center leading-tight max-w-full truncate">{app.title}</span>
          </button>
        ))}
      </div>

      {/* Desktop Clock Widget */}
      <div className="absolute right-3 top-3 pointer-events-none">
        <div className="bg-black/30 backdrop-blur-xl rounded-2xl px-4 py-3 text-white text-right border border-white/10 shadow-xl">
          <div className="text-2xl font-thin tracking-tight">{time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
          <div className="text-xs text-white/50 mt-0.5">{time.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        </div>
      </div>

      {/* Windows */}
      {Object.values(APPS).filter(a=>!a.isExternal).map(app=>(
        <WinFrame key={app.id} app={app} state={wins[app.id]} active={activeId===app.id}
          onClose={()=>closeW(app.id)} onMin={()=>minW(app.id)} onMax={()=>maxW(app.id)}
          onFocus={()=>focusW(app.id)} onMove={pos=>moveW(app.id,pos)} onResize={sz=>resizeW(app.id,sz)}>
          {renderApp(app.id)}
        </WinFrame>
      ))}

      {/* TASKBAR */}
      <div className={`fixed bottom-0 left-0 w-full h-12 backdrop-blur-2xl border-t flex justify-between items-center px-3 z-[500] shadow-lg ${tbBg}`}>
        <div className="flex items-center gap-1.5">
          <button onClick={e=>{e.stopPropagation();setStartOpen(s=>!s);setSearch('');}}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${startOpen?'bg-blue-600 text-white':dark?'hover:bg-white/10 text-white':'hover:bg-black/10'}`}>
            <Menu size={16}/><span>Start</span>
          </button>
          <div className={`h-5 w-px ${dark?'bg-slate-600':'bg-slate-300'} mx-0.5`}/>
          <div className="flex gap-0.5">
            {Object.values(APPS).map(app=>{
              const s=wins[app.id],isOpen=s?.open,isActive=activeId===app.id;
              if(!isOpen&&!app.isExternal)return null;
              if(app.isExternal&&!isActive)return null;
              return(
                <button key={app.id} onClick={()=>isActive?minW(app.id):focusW(app.id)} title={app.title}
                  className={`p-1.5 rounded-lg transition-all relative ${isActive?'bg-blue-100 text-blue-700':dark?'hover:bg-white/10 text-white':'hover:bg-black/8 text-slate-600'}`}>
                  <app.icon size={17}/>
                  {isOpen&&<div className={`absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full ${isActive?'bg-blue-600':'bg-slate-400'}`}/>}
                </button>
              );
            })}
          </div>
        </div>
        {/* System Tray */}
        <div className="flex items-center gap-1.5">
          <Wifi size={14} className={dark?'text-white/50':'text-slate-400'}/>
          <div className="relative">
            <button onClick={e=>{e.stopPropagation();setShowVol(v=>!v);}} className={`p-1.5 rounded-md hover:bg-black/8 transition-colors ${dark?'text-white/70':''}`}>
              {vol===0?<VolumeX size={14}/>:vol<40?<Volume1 size={14}/>:<Volume2 size={14}/>}
            </button>
            {showVol&&<div className="absolute bottom-11 right-0 bg-white rounded-2xl shadow-2xl p-4 border border-gray-100 w-36" onClick={e=>e.stopPropagation()}>
              <div className="text-xs text-gray-500 mb-2 text-center font-medium">Volume: {vol}%</div>
              <input type="range" min="0" max="100" value={vol} onChange={e=>setVol(+e.target.value)} className="w-full accent-blue-500"/>
            </div>}
          </div>
          <div className="flex items-center gap-0.5">
            <Battery size={15} className={bat<20?'text-red-500':dark?'text-white/60':'text-slate-500'}/>
            <span className={`text-xs ${dark?'text-white/60':'text-slate-500'}`}>{Math.round(bat)}%</span>
          </div>
          <button onClick={e=>{e.stopPropagation();setDark(d=>!d);}} className={`p-1.5 rounded-md hover:bg-black/8 transition-colors ${dark?'text-yellow-400':''}`}>
            {dark?<Sun size={14}/>:<Moon size={14}/>}
          </button>
          <div className={`flex flex-col items-end text-xs cursor-default ml-1 ${dark?'text-white':'text-slate-700'}`}>
            <span className="font-semibold">{time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            <span className="opacity-50 text-[10px]">{time.toLocaleDateString()}</span>
          </div>
        </div>
      </div>

      {/* START MENU */}
      {startOpen&&(
        <div className={`fixed bottom-14 left-2 w-[300px] backdrop-blur-2xl rounded-2xl shadow-2xl border p-3 z-[600] ${dark?'bg-slate-800/98 border-slate-700':'bg-white/98 border-white/60'}`}
          onClick={e=>e.stopPropagation()}>
          <div className="p-3 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl mb-3 flex items-center gap-3 text-white shadow-lg">
            <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-lg font-bold">U</div>
            <div><div className="font-bold text-sm">User</div><div className="text-xs opacity-70">Administrator · WebOS Ultra</div></div>
          </div>
          {/* Search bar */}
          <div className={`flex items-center gap-2 px-3 py-2 rounded-xl mb-3 border ${dark?'bg-slate-700 border-slate-600':'bg-gray-100 border-gray-200'}`}>
            <Search size={13} className={dark?'text-slate-400':'text-gray-400'}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search apps..."
              className={`flex-1 bg-transparent text-sm outline-none ${dark?'text-white placeholder-slate-400':'text-gray-700 placeholder-gray-400'}`}/>
            {search&&<button onClick={()=>setSearch('')} className="text-gray-400 hover:text-gray-600"><X size={11}/></button>}
          </div>
          {/* Results */}
          {search?(
            <div className="grid grid-cols-2 gap-1 mb-2 max-h-48 overflow-y-auto">
              {filteredApps.length===0
                ?<div className={`col-span-2 text-center py-6 text-sm ${dark?'text-slate-500':'text-gray-400'}`}>No apps found</div>
                :filteredApps.map(app=>(
                  <button key={app.id} onClick={()=>openApp(app.id)} className={`flex items-center gap-2 p-2 rounded-xl transition-all text-left hover:scale-[1.02] ${dark?'hover:bg-white/10':'hover:bg-slate-50'}`}>
                    <div className={`p-1.5 rounded-lg ${app.color} text-white shrink-0`}><app.icon size={14}/></div>
                    <span className={`text-xs font-medium truncate ${dark?'text-white':'text-slate-700'}`}>{app.title}</span>
                  </button>
                ))
              }
            </div>
          ):(
            Object.entries(appGroups).map(([group,ids])=>(
              <div key={group} className="mb-2">
                <div className={`text-[10px] font-bold uppercase tracking-wider px-2 mb-1 ${dark?'text-slate-400':'text-slate-400'}`}>{group}</div>
                <div className="grid grid-cols-2 gap-1">
                  {ids.map(id=>{const app=APPS[id];return(
                    <button key={id} onClick={()=>openApp(id)} className={`flex items-center gap-2 p-2 rounded-xl transition-all text-left hover:scale-[1.02] ${dark?'hover:bg-white/10':'hover:bg-slate-50'}`}>
                      <div className={`p-1.5 rounded-lg ${app.color} text-white shrink-0`}><app.icon size={13}/></div>
                      <span className={`text-xs font-medium truncate ${dark?'text-white':'text-slate-700'}`}>{app.title}</span>
                    </button>
                  );})}
                </div>
              </div>
            ))
          )}
          <div className={`h-px my-2 ${dark?'bg-slate-700':'bg-gray-100'}`}/>
          <div className="flex items-center justify-between">
            <button onClick={()=>{openApp('settings');setStartOpen(false);}} className={`flex items-center gap-2 p-2 rounded-xl transition-colors ${dark?'hover:bg-white/10 text-white/60 hover:text-white':'hover:bg-gray-100 text-gray-500 hover:text-gray-700'}`}>
              <Settings size={14}/><span className="text-xs">Settings</span>
            </button>
            <button onClick={()=>{if(confirm('Shutdown WebOS?'))document.body.innerHTML='<div style="background:#000;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-family:Inter,sans-serif;font-size:13px;letter-spacing:.2em">SYSTEM OFFLINE</div>';}}
              className="flex items-center gap-2 p-2 hover:bg-red-50 text-red-500 rounded-xl transition-colors">
              <Power size={14}/><span className="text-xs font-medium">Shutdown</span>
            </button>
          </div>
        </div>
      )}

      {/* CONTEXT MENUS */}
      {ctx&&<CtxMenu x={ctx.x} y={ctx.y} items={desktopCtxItems} onClose={()=>setCtx(null)}/>}

      {iconCtx&&<CtxMenu x={iconCtx.x} y={iconCtx.y} onClose={()=>setIconCtx(null)} items={[
        {icon:'🚀',label:`Open ${APPS[iconCtx.id]?.title}`,fn:()=>openApp(iconCtx.id)},
        {sep:true},
        {icon:'🔼',label:'Bring to Front',fn:()=>focusW(iconCtx.id)},
        {icon:'🔽',label:'Minimize',fn:()=>minW(iconCtx.id)},
        {sep:true},
        {icon:'✕',label:'Close',fn:()=>closeW(iconCtx.id),red:true},
      ]}/>}

      {/* WALLPAPER PICKER */}
      {showWP&&<WPPicker current={wallpaper} onSelect={setWallpaper} onClose={()=>setShowWP(false)}/>}

      {/* NOTIFICATIONS */}
      <NtfToast ntfs={ntfs} dismiss={dismissNtf}/>
    </div>
    </NtfCtx.Provider>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<FSProvider><App/></FSProvider>);
</script>
</body>
</html>
